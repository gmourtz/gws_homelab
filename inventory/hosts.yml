---
all:
  vars:
    ansible_user: gws
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519_gws_homelab
    ansible_python_interpreter: /usr/bin/python3

  children:
    routers:
      hosts:
        mikrotik:
          ansible_host: 192.168.10.1   # post-config management IP; for first bootstrap run: -e ansible_host=192.168.88.1
          ansible_connection: local

    rpis:
      hosts:
        rpi3:
          ansible_host: 192.168.10.10
          mac_address: "b8:27:eb:7c:73:db"
          device_info: "Raspberry Pi 3 B+ (906 MiB RAM)"

    x86:
      hosts:
        optiplex:
          ansible_host: 192.168.10.20
          device_info: "Dell OptiPlex 3040 Micro (i5-6500T, 6GB RAM, 240GB SSD)"

        openclaw:
          ansible_host: 192.168.10.30   # TODO: update once hardware is known
          device_info: "TBD — openclaw server"
