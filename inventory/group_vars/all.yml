---
# Shared variables for all hosts

admin_user: gws
admin_ssh_pubkey: "{{ lookup('file', '~/.ssh/id_ed25519_gws_homelab.pub') }}"
timezone: Europe/Athens

packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - tmux
  - ufw
  - unattended-upgrades
  - fail2ban

# Fail2ban
fail2ban_maxretry: 5
fail2ban_bantime: 3600
fail2ban_findtime: 600

# Monitoring — Beszel (https://github.com/henrygd/beszel)
# Hub runs on optiplex, agent runs on all hosts
beszel_hub_host: optiplex
beszel_hub_port: 8090
beszel_agent_port: 45876
