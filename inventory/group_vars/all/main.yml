# ---------------------------------------------------------------------------
# Event scout (apps/event_scout_agent — runs on optiplex)
#
# Rendered to /data/config.yml in the event-scout-agent container by
# deploy-stacks.yml (stacks/event-scout-agent-config.yml.j2). The app re-reads the
# file every cycle. To change topics or add a source: edit here, `make stacks`.
#
# Sources (all free, no auth):
#   Meetup group:   https://www.meetup.com/<group-slug>/events/ical/
#   Luma calendar:  https://api.lu.ma/ics/get?entity=calendar&id=<cal-...>
#   Eventbrite:     https://www.eventbrite.co.uk/d/united-kingdom--london/<keyword>/
#   Anything else with an iCal feed goes under `ics:`.
#
# The service only deploys once vault_event_scout_telegram_bot_token and
# vault_event_scout_telegram_chat_id exist (dedicated bot:
# t.me/gws_events_scout_bot — separate from the portfolio-agent bot).
# ---------------------------------------------------------------------------
event_scout_agent:
  location: "London"
  lookahead_days: 45
  min_score: 6          # 0-10; only events scoring >= this are notified
  include_online: false
  # Notification recipients — each gets their own independent Telegram digest.
  # Creds come from the named env vars (wired from the vault in stacks/optiplex.yml);
  # a recipient whose env vars are unset stays inert. backfill=true gets the current
  # catalogue on first run; backfill=false (a new joiner) only gets events discovered
  # after they were added — no initial load. Add a person: append an entry here + wire
  # its two env vars from the vault in the compose file.
  recipients:
    - { name: "georgios", token_env: "TELEGRAM_BOT_TOKEN",        chat_env: "TELEGRAM_CHAT_ID",        backfill: true }
    # Sultan on his own bot (gws_events_scout_sultan_bot) — gets the current catalogue on first run
    - { name: "sultan",   token_env: "SULTAN_TELEGRAM_BOT_TOKEN", chat_env: "SULTAN_TELEGRAM_CHAT_ID", backfill: true }
    # Deniz on his own bot (gws_events_scout_deniz_bot) — gets the current catalogue on first run
    - { name: "deniz",    token_env: "DENIZ_TELEGRAM_BOT_TOKEN",  chat_env: "DENIZ_TELEGRAM_CHAT_ID",  backfill: true }
  topics:
    - data engineering
    - AI / LLMs / agents — especially agent harnesses, agentic development, and agent engineering
    - AI/data startup engineering/product events and founder talks (NOT generic networking or pitch nights)
    - Databricks
    - Anthropic / Claude
    - OpenAI / ChatGPT
    - Snowflake / dbt
    - AWS
  # Free-text preferences injected into the ranking prompt
  notes: >-
    The user is a senior data platform engineer — exclude beginner/introductory
    courses, bootcamps, and "from zero" training; prefer practitioner-level and
    advanced content. Score higher when a founder or technical C-level/VP-level
    executive of a tech company (CTO, VP Engineering, Head of AI/Data, etc.)
    is speaking at the event.
