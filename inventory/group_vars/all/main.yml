---
# Shared variables for all hosts

admin_user: gws
admin_ssh_pubkey: "{{ lookup('file', '~/.ssh/id_ed25519_gws_homelab.pub') }}"
timezone: Europe/London

packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - tmux
  - ufw
  - unattended-upgrades
  - fail2ban

# Fail2ban
fail2ban_maxretry: 5
fail2ban_bantime: 3600
fail2ban_findtime: 600

# Container registry
ghcr_registry: ghcr.io

# Stacks deployment
stacks_dest: /opt/stacks

# Local domain suffix — used by Pi-hole (FTLCONF_dns_hosts), /etc/hosts, and DHCP search domain
local_domain: internal

# Local DNS records — served by Pi-hole (FTLCONF_dns_hosts env var) on rpi3
# Also used to populate /etc/hosts on all hosts
# Format: { name: "<hostname>", ip: "<ip>", aliases: ["<alias1>", ...] }
# - name: the primary hostname (typically the inventory hostname)
# - aliases: optional service names that resolve to the same IP
dns_records:
  - { name: optiplex, ip: "192.168.10.20", tag: hosts, aliases: [beszel, jellyfin, audiobookshelf, stirling-pdf, it-tools, drawio, homepage, dozzle, jellyseerr, musicseerr, paperless, paperless-gpt, immich, uptime-kuma, actual-budget, navidrome, qbittorrent, prowlarr, radarr, sonarr, lidarr, bazarr, chat, air-quality, air-quality-collector] }
  - { name: rpi3,     ip: "192.168.10.10", tag: hosts, aliases: [pihole] }
  - { name: kali,     ip: "192.168.50.11", tag: hosts, aliases: [juice-shop, webgoat] }
  - { name: openclaw, ip: "192.168.40.30", tag: hosts }
  - { name: localllm, ip: "192.168.10.30", tag: hosts }

# Services proxied by Caddy on optiplex (port 80, routed by Host header)
# - name: DNS alias (must exist in dns_records aliases)
# - upstream: container_name:port (resolved via Docker Compose DNS)
proxy_services:
  - { name: beszel,        upstream: "beszel-hub:8090",       tag: monitoring     }
  - { name: jellyfin,      upstream: "jellyfin:8096",         tag: media          }
  - { name: audiobookshelf, upstream: "audiobookshelf:80",    tag: media          }
  - { name: it-tools,      upstream: "it-tools:80",           tag: tools          }
  - { name: homepage,      upstream: "homepage:3000",         tag: infrastructure }
  - { name: dozzle,        upstream: "dozzle:8080",           tag: infrastructure }
  - { name: jellyseerr,    upstream: "jellyseerr:5055",       tag: media          }
  - { name: musicseerr,    upstream: "musicseerr:8688",       tag: media          }
  - { name: paperless,     upstream: "paperless-ngx:8000",    tag: tools          }
  - { name: immich,        upstream: "immich-server:2283",    tag: media          }
  - { name: uptime-kuma,   upstream: "uptime-kuma:3001",      tag: monitoring     }
  - { name: actual-budget, upstream: "actual-budget:5006", tag: tools }
  - { name: navidrome,     upstream: "navidrome:4533",     tag: media }
  - { name: qbittorrent,  upstream: "gluetun:8080",       tag: downloads }
  - { name: prowlarr,     upstream: "gluetun:9696",       tag: downloads }
  - { name: radarr,       upstream: "gluetun:7878",       tag: downloads }
  - { name: sonarr,       upstream: "gluetun:8989",       tag: downloads }
  - { name: lidarr,       upstream: "gluetun:8686",       tag: downloads }
  - { name: bazarr,       upstream: "gluetun:6767",       tag: downloads }
  - { name: chat,         upstream: "localllm.internal:8080", tag: ai }   # Open WebUI on localllm
  - { name: paperless-gpt, upstream: "paperless-gpt:8080",  tag: ai }
  - { name: air-quality-collector, upstream: "air-quality-collector:8502", tag: monitoring }

# qBittorrent download categories — written to /config/qBittorrent/categories.json on first run only.
# Used by Radarr/Sonarr/Lidarr to route downloads into separate folders.
qbittorrent_categories:
  - { name: movies, save_path: "/data/torrents/movies" }
  - { name: tv,     save_path: "/data/torrents/tv" }
  - { name: music,  save_path: "/data/torrents/music" }

# Navidrome plugins (downloaded by deploy-stacks.yml into the navidrome-data volume's plugins/ dir).
# Pin to specific versions for reproducibility — bump when new versions are released.
# After a fresh deploy: open https://navidrome.internal → Profile (top-right) → Plugins → enable each.
navidrome_plugins:
  - name: listenbrainz-daily-playlist
    url: "https://github.com/kgarner7/navidrome-listenbrainz-daily-playlist/releases/download/v5.0.2/listenbrainz-daily-playlist.ndp"
  - name: navidrome-lrclib
    url: "https://github.com/kepelet/navidrome-lrclib-plugin/releases/download/0.1.0/navidrome-lrclib.ndp"

# On-demand services managed by Sablier (auto start on request, auto stop after idle)
# - name: DNS alias (must exist in dns_records aliases)
# - upstream: container_name:port (resolved via Docker Compose DNS)
# - group: Sablier group name (must match sablier.group label on the container)
# - session_duration: how long the container stays up after last request
ondemand_services:
  - { name: stirling-pdf, upstream: "stirling-pdf:8080", group: "stirling-pdf", session_duration: "30m", tag: tools }
  - { name: drawio,       upstream: "drawio:8080",       group: "drawio",       session_duration: "30m", tag: tools }
  - { name: air-quality,  upstream: "air-quality-dashboard:8501", group: "air-quality", session_duration: "30m", tag: monitoring }

# Services shared with family/friends via Tailscale node sharing.
# For each entry, stacks/optiplex.yml templates a Tailscale sidecar container that
# joins the tailnet as `<name>-share` and serves the upstream over HTTPS via
# Tailscale Serve at https://<name>-share.<your-tailnet>.ts.net.
# Sidecars only deploy if vault_tailscale_jellyfin_authkey is defined.
# - name: short identifier (becomes container/volume/hostname suffix)
# - upstream: container_name:port (must be reachable on `network`)
# - network: Docker network the sidecar joins (must be the same network the upstream is on)
# Setup + onboarding: docs/jellyfin-family-access.md
shared_services:
  - { name: jellyfin,    upstream: "jellyfin:8096",    network: jellyfin-net }
  - { name: jellyseerr,  upstream: "jellyseerr:5055",  network: jellyseerr-net }
  - { name: navidrome,   upstream: "navidrome:4533",   network: navidrome-net }
  - { name: musicseerr,  upstream: "musicseerr:8688",  network: navidrome-net }

# Uptime Kuma monitors to remove — names of deprecated monitors that are no longer
# in proxy_services / ondemand_services / dns_records but still exist in Kuma's
# database. The cleanup task in deploy-stacks.yml deletes these by exact name.
# For host SSH monitors (created from dns_records), include the "(ssh)" suffix.
removed_kuma_monitors:
  # Sablier-managed on-demand services — were polled every 60s by Kuma,
  # keeping them permanently warm. Removed so they can actually go idle.
  - stirling-pdf
  - drawio

# Awair Element air-quality sensors — polled by the air-quality-collector
# container on optiplex (stacks/optiplex.yml templates this list into the
# AWAIR_DEVICES env var via `to_json`).
# NOTE: these sensors are still on the legacy ZTE network (192.168.1.x), whose
# DHCP is not IaC-managed. If an IP drifts, update it here and run `make stacks`.
# When the sensors move to the GWS-IoT VLAN, change the IPs to 192.168.20.x.
awair_devices:
  - { name: "Awair Element 1", hostname: "192.168.1.100", device_mac: "70:88:6b:14:ca:f0" }
  - { name: "Awair Element 2", hostname: "192.168.1.101", device_mac: "70:88:6b:14:cb:f1" }

# ---------------------------------------------------------------------------
# Paperless-ngx taxonomy (append-only)
#
# Managed by deploy-stacks.yml — each item is POSTed to the Paperless API.
# Duplicates are silently ignored (API returns 400, task ignores errors).
# To add items: append here and run `make stacks`.
# To rename/delete: do it in the Paperless UI (IaC is create-only).
# ---------------------------------------------------------------------------
paperless_document_types:
  - Bank Statement
  - Blood Test
  - Certificate
  - Contract
  - ID Document
  - Insurance Claim
  - Insurance Policy
  - Invoice
  - Letter
  - Medical Record
  - Payslip
  - Prescription
  - Receipt
  - Referral
  - Resume/CV
  - Tax Return
  - Utility Bill

paperless_tags:
  # Education
  - edu:education
  # Finance
  - fin:bank_statement
  - fin:finance
  - fin:payslip
  - fin:pension
  - fin:tax
  # Geography
  - geo:greece
  - geo:uk
  - geo:us
  # Language
  - lang:english
  - lang:greek
  # Medical specialties
  - med:cardiology
  - med:dental
  - med:dermatology
  - med:emergency
  - med:endocrinology
  - med:english
  - med:ent
  - med:eopyy
  - med:gastroenterology
  - med:general_practice
  - med:greek
  - med:gynecology
  - med:lab_results
  - med:neurology
  - med:nhs
  - med:ophthalmology
  - med:orthopedics
  - med:private_insurance
  - med:pulmonology
  - med:routine_checkup
  - med:urology
  - med:vaccination
  # General
  - medical
  - personal
  # System
  - sys:needs-review
  - sys:paperless-gpt
  - sys:paperless-gpt-auto
  # Work
  - work:employment

paperless_correspondents:
  - Arkadia Energy Solutions Ltd
  - GEODOMI LTD
  - HMRC
  - Kubrick Group Ltd
  - Legal & General (Portfolio Management Services) Limited
  - Rightmove Group Ltd
  - Siemens Plc
  - U.S. Department of Homeland Security
  - Vitality Corporate Services Limited
  - ΒΙΟΠΑΘΟΛΟΓΙΚΟ - ΜΙΚΡΟΒΙΟΛΟΓΙΚΟ ΕΡΓΑΣΤΗΡΙΟ
  - ΒΙΟΤΥΠΟΣ

# data_type values: string, url, date, boolean, integer, float, monetary, document_link
paperless_custom_fields:
  - { name: amount,           data_type: monetary }
  - { name: diagnosis,        data_type: string }
  - { name: doctor_name,      data_type: string }
  - { name: follow_up_date,   data_type: date }
  - { name: language,         data_type: string }
  - { name: reference_number, data_type: string }
