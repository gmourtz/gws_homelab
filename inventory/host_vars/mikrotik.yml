---
# MikroTik hAP ac² — RouterOS configuration variables
# Used by playbooks/configure-routeros.yml

ansible_python_interpreter: /Users/georgiosmourtzinos/.pyenv/versions/gws_homelab/bin/python3

routeros_api_username: admin

routeros_hostname: mikrotik
routeros_timezone: Europe/London

routeros_ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org

routeros_dns_servers:
  - 1.1.1.1
  - 9.9.9.9
routeros_dns_allow_remote_requests: false

# ---------------------------------------------------------------------------
# VLANs
# ---------------------------------------------------------------------------
vlans:
  - id: 10
    name: trusted
    subnet: 192.168.10.0/24
    gateway: 192.168.10.1
    dhcp_pool_name: pool-trusted
    dhcp_range_start: 192.168.10.100
    dhcp_range_end: 192.168.10.199
    dns_servers:
      - 192.168.10.10   # Pi-hole
      - 1.1.1.1
    domain: internal

  - id: 20
    name: iot
    subnet: 192.168.20.0/24
    gateway: 192.168.20.1
    dhcp_pool_name: pool-iot
    dhcp_range_start: 192.168.20.100
    dhcp_range_end: 192.168.20.199
    dns_servers:
      - 192.168.10.10   # Pi-hole (firewall allows IoT -> Pi-hole port 53)
    domain: internal

  - id: 30
    name: guest
    subnet: 192.168.30.0/24
    gateway: 192.168.30.1
    dhcp_pool_name: pool-guest
    dhcp_range_start: 192.168.30.100
    dhcp_range_end: 192.168.30.199
    dns_servers:
      - 1.1.1.1
      - 9.9.9.9

  - id: 40
    name: agent
    subnet: 192.168.40.0/24
    gateway: 192.168.40.1
    dhcp_pool_name: pool-agent
    dhcp_range_start: 192.168.40.100
    dhcp_range_end: 192.168.40.199
    dns_servers:
      - 192.168.10.10   # Pi-hole
      - 1.1.1.1
    domain: internal

  # VLAN 50 — Lab (Kali + vulnerable training targets)
  # Hard-isolated from all internal VLANs by firewall (see lab rules below).
  # Uses public DNS, NOT Pi-hole — keeps Pi-hole query logs clean of attack noise.
  - id: 50
    name: lab
    subnet: 192.168.50.0/24
    gateway: 192.168.50.1
    dhcp_pool_name: pool-lab
    dhcp_range_start: 192.168.50.100
    dhcp_range_end: 192.168.50.199
    dns_servers:
      - 1.1.1.1
      - 9.9.9.9
    domain: lab

# ---------------------------------------------------------------------------
# DHCP static leases
# ---------------------------------------------------------------------------
dhcp_static_leases:
  - comment: rpi3
    mac_address: "B8:27:EB:7C:73:DB"
    ip_address: 192.168.10.10
    server: dhcp-trusted

  - comment: optiplex
    mac_address: "48:4D:7E:EA:8A:E1"
    ip_address: 192.168.10.20
    server: dhcp-trusted

  - comment: openclaw
    mac_address: "94:E6:F7:E5:2E:32"
    ip_address: 192.168.40.30
    server: dhcp-agent

  - comment: localllm
    mac_address: "C4:5A:B1:FB:17:A1"
    ip_address: 192.168.10.30
    server: dhcp-trusted

  - comment: kali
    mac_address: "88:A2:9E:75:22:86"
    ip_address: 192.168.50.11
    server: dhcp-lab

# ---------------------------------------------------------------------------
# WiFi SSIDs
# ---------------------------------------------------------------------------
wifi_ssids:
  - ssid: gws_home
    vlan_id: 10
    band_2ghz: true
    band_5ghz: true
    security_mode: wpa3-psk
    vault_passphrase_var: vault_wifi_passphrase_home

  - ssid: gws_iot
    vlan_id: 20
    band_2ghz: true
    band_5ghz: false
    security_mode: wpa2-psk
    client_isolation: true
    vault_passphrase_var: vault_wifi_passphrase_iot

  - ssid: gws_guest
    vlan_id: 30
    band_2ghz: true
    band_5ghz: true
    security_mode: wpa2-psk
    vault_passphrase_var: vault_wifi_passphrase_guest

  - ssid: gws_agent
    vlan_id: 40
    band_2ghz: true
    band_5ghz: false
    security_mode: wpa2-psk
    vault_passphrase_var: vault_wifi_passphrase_agent

# ---------------------------------------------------------------------------
# Firewall filter rules (ordered — applied exactly as listed)
# ---------------------------------------------------------------------------
firewall_filter_rules:
  # --- Input chain: traffic destined for the router itself ---
  - chain: input
    action: accept
    comment: "accept established/related to router"
    connection-state: established,related

  - chain: input
    action: drop
    comment: "drop invalid to router"
    connection-state: invalid

  - chain: input
    action: accept
    comment: "accept ICMP to router (trusted VLAN only)"
    protocol: icmp
    in-interface: bridge1.10

  - chain: input
    action: accept
    comment: "accept management from trusted VLAN"
    src-address: 192.168.10.0/24
    in-interface: bridge1.10

  - chain: input
    action: drop
    comment: "drop all other input"

  # --- Forward chain: traffic routed through the router ---
  - chain: forward
    action: accept
    comment: "accept established/related forward"
    connection-state: established,related

  - chain: forward
    action: drop
    comment: "drop invalid forward"
    connection-state: invalid

  # Trusted -> Guest: drop (no reason to allow)
  - chain: forward
    action: drop
    comment: "drop trusted -> guest"
    src-address: 192.168.10.0/24
    dst-address: 192.168.30.0/24
    in-interface: bridge1.10

  # Trusted -> internet + IoT (can manage IoT devices)
  - chain: forward
    action: accept
    comment: "trusted -> internet and IoT"
    src-address: 192.168.10.0/24
    in-interface: bridge1.10

  # IoT -> Pi-hole DNS only
  - chain: forward
    action: accept
    comment: "IoT -> Pi-hole DNS"
    src-address: 192.168.20.0/24
    dst-address: 192.168.10.10
    protocol: udp
    dst-port: "53"
    in-interface: bridge1.20

  - chain: forward
    action: accept
    comment: "IoT -> Pi-hole DNS (TCP)"
    src-address: 192.168.20.0/24
    dst-address: 192.168.10.10
    protocol: tcp
    dst-port: "53"
    in-interface: bridge1.20

  # IoT -> internet HTTP/HTTPS
  - chain: forward
    action: accept
    comment: "IoT -> internet HTTP/HTTPS"
    src-address: 192.168.20.0/24
    out-interface: ether1
    protocol: tcp
    dst-port: "80,443"
    in-interface: bridge1.20

  # IoT -> internet NTP (needed for TLS certificate validation)
  - chain: forward
    action: accept
    comment: "IoT -> internet NTP"
    src-address: 192.168.20.0/24
    out-interface: ether1
    protocol: udp
    dst-port: "123"
    in-interface: bridge1.20

  # TODO: add device-specific ports as needed, e.g.:
  #   RTSP streaming:       tcp dst-port 554
  #   ONVIF discovery:      tcp dst-port 8080
  #   Some cloud cameras:   udp dst-port 6000-7000

  # Agent -> Pi-hole DNS
  - chain: forward
    action: accept
    comment: "agent -> Pi-hole DNS"
    src-address: 192.168.40.0/24
    dst-address: 192.168.10.10
    protocol: udp
    dst-port: "53"
    in-interface: bridge1.40

  - chain: forward
    action: accept
    comment: "agent -> Pi-hole DNS (TCP)"
    src-address: 192.168.40.0/24
    dst-address: 192.168.10.10
    protocol: tcp
    dst-port: "53"
    in-interface: bridge1.40

  # Agent -> Beszel hub (monitoring)
  - chain: forward
    action: accept
    comment: "agent -> beszel-hub on optiplex"
    src-address: 192.168.40.30
    dst-address: 192.168.10.20
    protocol: tcp
    dst-port: "8090"
    in-interface: bridge1.40

  # Agent -> Health MCP on optiplex (health-coach agent reads/writes health data)
  - chain: forward
    action: accept
    comment: "agent -> health-mcp on optiplex"
    src-address: 192.168.40.30
    dst-address: 192.168.10.20
    protocol: tcp
    dst-port: "8100"
    in-interface: bridge1.40

  # Agent -> internet HTTP/HTTPS
  - chain: forward
    action: accept
    comment: "agent -> internet HTTP/HTTPS"
    src-address: 192.168.40.0/24
    out-interface: ether1
    protocol: tcp
    dst-port: "80,443"
    in-interface: bridge1.40

  # Agent -> internet NTP
  - chain: forward
    action: accept
    comment: "agent -> internet NTP"
    src-address: 192.168.40.0/24
    out-interface: ether1
    protocol: udp
    dst-port: "123"
    in-interface: bridge1.40

  # ---------------------------------------------------------------
  # Lab (VLAN 50) — pentesting box (Kali)
  #
  # Asymmetric isolation:
  #   - Lab CANNOT initiate to any internal VLAN (drop rule below).
  #   - Trusted CAN reach lab via the permissive "trusted -> internet
  #     and IoT" rule above (no dst restriction). Browse Juice Shop /
  #     SSH to Kali from your laptop without VLAN-hopping.
  # If a target gets popped, blast radius stops at 192.168.50.0/24.
  #
  # Monitoring exceptions (must come before the drop rule):
  #   - beszel-agent connects out to beszel-hub on optiplex:8090
  # ---------------------------------------------------------------

  # Lab -> beszel-hub (monitoring — same pattern as agent VLAN)
  - chain: forward
    action: accept
    comment: "kali -> beszel-hub on optiplex"
    src-address: 192.168.50.0/24
    dst-address: 192.168.10.20
    protocol: tcp
    dst-port: "8090"
    in-interface: bridge1.50

  - chain: forward
    action: drop
    comment: "drop lab -> all internal VLANs (lab isolation)"
    src-address: 192.168.50.0/24
    dst-address: 192.168.0.0/16
    in-interface: bridge1.50

  # Lab -> internet HTTP/HTTPS (apt updates, container image pulls,
  # connecting to HTB/THM/CTF targets)
  - chain: forward
    action: accept
    comment: "lab -> internet HTTP/HTTPS"
    src-address: 192.168.50.0/24
    out-interface: ether1
    protocol: tcp
    dst-port: "80,443"
    in-interface: bridge1.50

  # Lab -> public DNS (1.1.1.1 / 9.9.9.9 — never Pi-hole)
  - chain: forward
    action: accept
    comment: "lab -> internet DNS (UDP)"
    src-address: 192.168.50.0/24
    out-interface: ether1
    protocol: udp
    dst-port: "53"
    in-interface: bridge1.50

  - chain: forward
    action: accept
    comment: "lab -> internet DNS (TCP)"
    src-address: 192.168.50.0/24
    out-interface: ether1
    protocol: tcp
    dst-port: "53"
    in-interface: bridge1.50

  - chain: forward
    action: accept
    comment: "lab -> internet NTP"
    src-address: 192.168.50.0/24
    out-interface: ether1
    protocol: udp
    dst-port: "123"
    in-interface: bridge1.50

  # Guest -> internet (all outbound)
  - chain: forward
    action: accept
    comment: "guest -> internet"
    src-address: 192.168.30.0/24
    out-interface: ether1
    in-interface: bridge1.30

  # Drop all other inter-VLAN and IoT/Guest/Agent traffic
  - chain: forward
    action: drop
    comment: "drop all other forward"

# ---------------------------------------------------------------------------
# Firewall NAT rules
# ---------------------------------------------------------------------------
firewall_nat_rules:
  - chain: srcnat
    action: masquerade
    comment: "masquerade WAN"
    out-interface: ether1

# ---------------------------------------------------------------------------
# IP services (harden — restrict or disable)
# ---------------------------------------------------------------------------
routeros_services:
  - { name: api,     port: 8728, disabled: false, address: 192.168.10.0/24 }
  - { name: api-ssl, port: 8729, disabled: true }
  - { name: ftp,     port: 21,   disabled: true }
  - { name: ssh,     port: 22,   disabled: false, address: 192.168.10.0/24 }
  - { name: telnet,  port: 23,   disabled: true }
  - { name: winbox,  port: 8291, disabled: false, address: 192.168.10.0/24 }
  - { name: www,     port: 80,   disabled: false, address: 192.168.10.0/24 }
  - { name: www-ssl, port: 443,  disabled: true }
