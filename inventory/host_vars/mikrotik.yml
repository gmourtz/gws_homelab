---
# MikroTik hAP ac² — RouterOS configuration variables
# Used by playbooks/configure-routeros.yml

ansible_python_interpreter: /Users/georgiosmourtzinos/.pyenv/versions/gws_homelab/bin/python3

routeros_api_username: admin

routeros_hostname: mikrotik
routeros_timezone: Europe/London

routeros_ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org

routeros_dns_servers:
  - 1.1.1.1
  - 9.9.9.9
routeros_dns_allow_remote_requests: false

# ---------------------------------------------------------------------------
# VLANs
# ---------------------------------------------------------------------------
vlans:
  - id: 10
    name: trusted
    subnet: 192.168.10.0/24
    gateway: 192.168.10.1
    dhcp_pool_name: pool-trusted
    dhcp_range_start: 192.168.10.100
    dhcp_range_end: 192.168.10.199
    dns_servers:
      - 192.168.10.10   # Pi-hole
      - 1.1.1.1
    domain: internal

  - id: 20
    name: iot
    subnet: 192.168.20.0/24
    gateway: 192.168.20.1
    dhcp_pool_name: pool-iot
    dhcp_range_start: 192.168.20.100
    dhcp_range_end: 192.168.20.199
    dns_servers:
      - 192.168.10.10   # Pi-hole (firewall allows IoT -> Pi-hole port 53)
    domain: internal

  - id: 30
    name: guest
    subnet: 192.168.30.0/24
    gateway: 192.168.30.1
    dhcp_pool_name: pool-guest
    dhcp_range_start: 192.168.30.100
    dhcp_range_end: 192.168.30.199
    dns_servers:
      - 1.1.1.1
      - 9.9.9.9

# ---------------------------------------------------------------------------
# DHCP static leases
# ---------------------------------------------------------------------------
dhcp_static_leases:
  - comment: rpi3
    mac_address: "B8:27:EB:7C:73:DB"
    ip_address: 192.168.10.10
    server: dhcp-trusted

  - comment: optiplex
    mac_address: "48:4D:7E:EA:8A:E1"
    ip_address: 192.168.10.20
    server: dhcp-trusted

# ---------------------------------------------------------------------------
# WiFi SSIDs
# ---------------------------------------------------------------------------
wifi_ssids:
  - ssid: GWS-Home
    vlan_id: 10
    band_2ghz: true
    band_5ghz: true
    security_mode: wpa2-psk
    vault_passphrase_var: vault_wifi_passphrase_home

  - ssid: GWS-IoT
    vlan_id: 20
    band_2ghz: true
    band_5ghz: false
    security_mode: wpa2-psk
    vault_passphrase_var: vault_wifi_passphrase_iot

  - ssid: GWS-Guest
    vlan_id: 30
    band_2ghz: true
    band_5ghz: true
    security_mode: wpa2-psk
    vault_passphrase_var: vault_wifi_passphrase_guest

# ---------------------------------------------------------------------------
# Firewall filter rules (ordered — applied exactly as listed)
# ---------------------------------------------------------------------------
firewall_filter_rules:
  # --- Input chain: traffic destined for the router itself ---
  - chain: input
    action: accept
    comment: "accept established/related to router"
    connection-state: established,related

  - chain: input
    action: drop
    comment: "drop invalid to router"
    connection-state: invalid

  - chain: input
    action: accept
    comment: "accept ICMP to router (LAN only)"
    protocol: icmp
    in-interface: "!ether1"

  - chain: input
    action: accept
    comment: "accept management from trusted VLAN"
    src-address: 192.168.10.0/24
    in-interface: bridge1.10

  - chain: input
    action: drop
    comment: "drop all other input"

  # --- Forward chain: traffic routed through the router ---
  - chain: forward
    action: accept
    comment: "accept established/related forward"
    connection-state: established,related

  - chain: forward
    action: drop
    comment: "drop invalid forward"
    connection-state: invalid

  # Trusted -> Guest: drop (no reason to allow)
  - chain: forward
    action: drop
    comment: "drop trusted -> guest"
    src-address: 192.168.10.0/24
    dst-address: 192.168.30.0/24
    in-interface: bridge1.10

  # Trusted -> internet + IoT (can manage IoT devices)
  - chain: forward
    action: accept
    comment: "trusted -> internet and IoT"
    src-address: 192.168.10.0/24
    in-interface: bridge1.10

  # IoT -> Pi-hole DNS only
  - chain: forward
    action: accept
    comment: "IoT -> Pi-hole DNS"
    src-address: 192.168.20.0/24
    dst-address: 192.168.10.10
    protocol: udp
    dst-port: "53"
    in-interface: bridge1.20

  - chain: forward
    action: accept
    comment: "IoT -> Pi-hole DNS (TCP)"
    src-address: 192.168.20.0/24
    dst-address: 192.168.10.10
    protocol: tcp
    dst-port: "53"
    in-interface: bridge1.20

  # IoT -> internet HTTP/HTTPS
  - chain: forward
    action: accept
    comment: "IoT -> internet HTTP/HTTPS"
    src-address: 192.168.20.0/24
    out-interface: ether1
    protocol: tcp
    dst-port: "80,443"
    in-interface: bridge1.20

  # IoT -> internet NTP (needed for TLS certificate validation)
  - chain: forward
    action: accept
    comment: "IoT -> internet NTP"
    src-address: 192.168.20.0/24
    out-interface: ether1
    protocol: udp
    dst-port: "123"
    in-interface: bridge1.20

  # Guest -> internet (all outbound)
  - chain: forward
    action: accept
    comment: "guest -> internet"
    src-address: 192.168.30.0/24
    out-interface: ether1
    in-interface: bridge1.30

  # Drop all other inter-VLAN and IoT/Guest traffic
  - chain: forward
    action: drop
    comment: "drop all other forward"

# ---------------------------------------------------------------------------
# Firewall NAT rules
# ---------------------------------------------------------------------------
firewall_nat_rules:
  - chain: srcnat
    action: masquerade
    comment: "masquerade WAN"
    out-interface: ether1

# ---------------------------------------------------------------------------
# IP services (harden — restrict or disable)
# ---------------------------------------------------------------------------
routeros_services:
  - { name: api,     port: 8728, disabled: false, address: 192.168.10.0/24 }
  - { name: api-ssl, port: 8729, disabled: true }
  - { name: ftp,     port: 21,   disabled: true }
  - { name: ssh,     port: 22,   disabled: false, address: 192.168.10.0/24 }
  - { name: telnet,  port: 23,   disabled: true }
  - { name: winbox,  port: 8291, disabled: false, address: 192.168.10.0/24 }
  - { name: www,     port: 80,   disabled: false, address: 192.168.10.0/24 }
  - { name: www-ssl, port: 443,  disabled: true }
