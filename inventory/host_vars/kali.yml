---
# Host vars for kali — Kali Linux, pentesting lab on VLAN 50.
# Used by playbooks/site-kali.yml (not site.yml — kali_lab group is excluded).

# UFW extra rules — host-networked service ports only; bridge-published ports bypass UFW (see playbooks/site-kali.yml)
ufw_extra_rules:
  # Beszel agent
  - { port: "45876", proto: tcp, src: "192.168.10.0/24" }

# Tailscale — tag:gws-homelab-kali is destination-only in the ACL (no outbound grants)
tailscale_enabled: true
tailscale_tags: "tag:gws-homelab-kali"
tailscale_authkey: "{{ vault_tailscale_authkey_kali }}"
