---
# Host vars for rpi3

# Pi-hole runs on this host — disable systemd-resolved stub listener
# so Pi-hole can bind port 53
disable_resolved_stub: true

# UFW extra rules — ports needed by stacks on this host
ufw_extra_rules:
  # Pi-hole DNS
  - { port: "53", proto: tcp, src: "192.168.1.0/24" }
  - { port: "53", proto: udp, src: "192.168.1.0/24" }
  # Pi-hole web UI
  - { port: "80", proto: tcp, src: "192.168.1.0/24" }
  # Beszel agent
  - { port: "45876", proto: tcp, src: "192.168.1.0/24" }
