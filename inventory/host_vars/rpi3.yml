---
# Host vars for rpi3

# Pi-hole runs on this host — disable systemd-resolved stub listener
# so Pi-hole can bind port 53
disable_resolved_stub: true

# Pi-hole allowlist — domains exempt from blocking (applies network-wide)
pihole_allowlist:
  - mask.icloud.com       # Apple Private Relay
  - mask-h2.icloud.com    # Apple Private Relay (HTTP/2)
  - mask-api.icloud.com   # Apple Private Relay API — also required for Apple Intelligence

# UFW extra rules — ports needed by stacks on this host
ufw_extra_rules:
  # Pi-hole DNS (trusted + IoT + agent VLANs — allowed through MikroTik firewall)
  - { port: "53", proto: tcp, src: "192.168.10.0/24" }
  - { port: "53", proto: udp, src: "192.168.10.0/24" }
  - { port: "53", proto: tcp, src: "192.168.20.0/24" }
  - { port: "53", proto: udp, src: "192.168.20.0/24" }
  - { port: "53", proto: tcp, src: "192.168.40.0/24" }
  - { port: "53", proto: udp, src: "192.168.40.0/24" }
  # Pi-hole DNS — Tailscale clients (subnet routing source IPs)
  - { port: "53", proto: tcp, src: "100.64.0.0/10" }
  - { port: "53", proto: udp, src: "100.64.0.0/10" }
  # Pi-hole web UI
  - { port: "80", proto: tcp, src: "192.168.10.0/24" }
  # Beszel agent
  - { port: "45876", proto: tcp, src: "192.168.10.0/24" }
  # Docker socket proxy (for homepage on optiplex)
  - { port: "2375", proto: tcp, src: "192.168.10.20" }
