---
# Host vars for optiplex

# External storage — two USB sticks pooled via mergerfs, presented at /mnt/media.
# Each drive stays an independent ext4 filesystem (a "branch"); mergerfs unions
# them so a single-drive failure loses only that drive's files. Branches must be
# mounted before the pool — site.yml mounts storage_branches first, then data_mount.
storage_branches:
  - src: UUID=66508e4d-74f7-45c0-a46f-f316c19b99bf   # existing media drive — never reformatted
    path: /mnt/disk1
    fstype: ext4
    opts: defaults,noatime,nofail
  - src: UUID=12fa574d-df8d-452a-8114-daf9e23d4c6b   # new drive — formatted ext4 (label pool-disk2)
    path: /mnt/disk2
    fstype: ext4
    opts: defaults,noatime,nofail

# mergerfs pool — unions the branches at /mnt/media (the path every service binds)
data_mount:
  src: "/mnt/disk1:/mnt/disk2"
  path: /mnt/media
  fstype: fuse.mergerfs
  opts: "defaults,nofail,allow_other,use_ino,cache.files=partial,category.create=mfs,minfreespace=20G,fsname=mergerfs,x-systemd.requires-mounts-for=/mnt/disk1,x-systemd.requires-mounts-for=/mnt/disk2"

# Directory tree created under the mount point
data_dirs:
  - videos
  - music
  - music-inbox              # manual drop zone — also scanned by Navidrome
  - youtube                  # token.json + client_secret.json live here
  - audiobooks
  - paperless-consume        # drop folder for Paperless-ngx auto-import
  - photos                   # Immich photo/video upload library
  - torrents                 # qBittorrent download root
  - torrents/movies
  - torrents/tv
  - torrents/music
  - movies                   # Radarr library (hardlinks from torrents/movies)
  - tv                       # Sonarr library (hardlinks from torrents/tv)
  - music/lidarr             # Lidarr music (separate from YouTube music playlist)

# Host-specific packages (extends group_vars packages list)
extra_packages:
  - intel-opencl-icd  # Intel GPU OpenCL runtime — enables HDR tone-mapping in Jellyfin QSV transcoding
  - mergerfs          # union filesystem — pools the storage_branches drives into /mnt/media

# UFW extra rules — ports needed by stacks on this host
ufw_extra_rules:
  # Beszel agent (LAN + Docker bridge so hub can reach agent on same host)
  - { port: "45876", proto: tcp, src: "192.168.10.0/24" }
  - { port: "45876", proto: tcp, src: "10.10.0.0/16" }
  # Caddy reverse proxy (serves beszel, jellyfin, etc.)
  - { port: "80",  proto: tcp, src: "192.168.10.0/24" }
  - { port: "80",  proto: tcp, src: "100.64.0.0/10" }  # Tailscale clients
  # Caddy HTTPS (tls internal self-signed CA — required by Safari for SharedArrayBuffer / secure context)
  - { port: "443", proto: tcp, src: "192.168.10.0/24" }
  - { port: "443", proto: tcp, src: "100.64.0.0/10" }  # Tailscale clients

# Tailscale — advertise all homelab subnets so remote clients can reach every VLAN
tailscale_advertise_routes:
  - 192.168.10.0/24   # Trusted (VLAN 10)
  - 192.168.40.0/24   # Agent / openclaw (VLAN 40)
  - 192.168.50.0/24   # Lab / kali (VLAN 50)
