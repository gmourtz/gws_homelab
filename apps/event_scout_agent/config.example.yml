# Example config for local development / dry runs.
# In production this file is templated by Ansible from the `event_scout_agent`
# var in inventory/group_vars/all/main.yml (stacks/event-scout-agent-config.yml.j2)
# and written into the container volume at /data/config.yml.

location: "London"
lookahead_days: 45
min_score: 6
include_online: false

# Each recipient gets an independent digest via its own bot. Creds come from the
# named env vars; unset creds => that recipient is skipped. backfill=false means
# a new joiner only gets events discovered after they were added (no initial load).
# (Left empty here: a dry run with no Telegram creds prints to the console instead.)
recipients: []

topics:
  - data engineering
  - AI / LLMs / agents — especially agent harnesses, agentic development, and agent engineering
  - AI/data startup engineering/product events and founder talks (NOT generic networking or pitch nights)
  - Databricks
  - Anthropic / Claude
  - OpenAI / ChatGPT
  - Snowflake / dbt
  - AWS

notes: >-
  The user is a senior data platform engineer — exclude beginner/introductory
  courses, bootcamps, and "from zero" training; prefer practitioner-level and
  advanced content. Score higher when a founder or technical C-level/VP-level
  executive of a tech company (CTO, VP Engineering, Head of AI/Data, etc.)
  is speaking at the event.

sources:
  ics:
    - name: "PyData London"
      url: "https://www.meetup.com/pydata-london-meetup/events/ical/"
    - name: "Air Street (London AI)"
      url: "https://api.lu.ma/ics/get?entity=calendar&id=cal-zUWmkxeBGlQQenp"
  eventbrite_searches:
    - name: "EB data engineering"
      url: "https://www.eventbrite.co.uk/d/united-kingdom--london/data-engineering/"
