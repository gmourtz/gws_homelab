version: 2
base_currency: GBP
fx_treatment: convert_at_snapshot

allocation:
  buckets:
    - name: US Equity
      markets: [US]
      target_pct: 53.0
      band_abs: 5.0
      band_rel: 25.0

    - name: UK Equity
      markets: [UK]
      target_pct: 20.0
      band_abs: 5.0
      band_rel: 25.0

    # Merge EU + Other into one realistic sleeve.
    # Put this after US/UK so "*" acts as "everything else".
    - name: International Equity
      markets: [DE, FR, NL, IT, ES, "*"]
      target_pct: 10.0
      band_abs: 4.0
      band_rel: 80.0   # wider to avoid constant triggers on small sleeves

    - name: Cash
      type: cash
      target_pct: 20.0
      band_abs: 5.0
      band_rel: 25.0

hard_limits:
  max_single_name_pct: 20.0
  max_top3_pct: 50.0
  max_single_market_pct: 70.0
  min_cash_pct: 2.0
  max_cash_pct: 30.0      # was 25; aligns with holding ~24% without instant escalation
  max_drawdown_pct: 20.0

rebalancing:
  cadence: quarterly
  method: threshold        # rebalance only when bands/limits are breached

governance:
  action_description: "Review required today"
  action_review_days: 0
  warning_description: "Review within 7 days"
  warning_review_days: 7
  info_description: "Monitor — no action needed"

thresholds:
  profit_taking_pct: 100.0
  deep_loss_pct: -30.0
  critical_loss_pct: -50.0
  health_warning: 60
  health_critical: 40