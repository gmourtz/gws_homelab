# kali — Kali Linux pentesting lab (VLAN 50)
#
# These containers are DELIBERATELY VULNERABLE training targets.
# Network exposure is locked down at three layers:
#   1. MikroTik firewall — VLAN 50 cannot initiate to any internal VLAN
#      (exception: beszel-agent → optiplex:8090, see mikrotik.yml)
#   2. UFW on this host — ports open only to trusted sources
#      (see inventory/host_vars/kali.yml)
#   3. Container ports bound to all interfaces (host firewall is the gate)
#
# Tailscale exposure is allowed but ADMIN-ONLY: kali carries tag:gws-homelab-kali,
# which the tailnet ACL lets only your own devices reach (and the tag has no
# outbound grants, so a popped target cannot pivot). Still do NOT expose any of
# these via Caddy or to the internet.
#
# Lab targets are gated behind the `lab` Compose profile so `make stacks`
# does NOT start them — they sit idle on a 2 GB Pi until you opt in.
# To start a session, SSH to kali and run:
#   cd /opt/stacks && docker compose --profile lab up -d juice-shop webgoat
# To end the session:
#   cd /opt/stacks && docker compose --profile lab stop juice-shop webgoat

services:
  # OWASP Juice Shop — modern SPA + REST API, OWASP Top 10 by design.
  # Best target for week 2-3: web recon, IDOR, XSS, SQLi, broken auth.
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    profiles: ["lab"]
    restart: "no"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # WebGoat — guided OWASP lessons (Java). Heavier on RAM (~500 MB) but
  # the structured curriculum is the best on-ramp before you go solo on Juice Shop.
  webgoat:
    image: webgoat/webgoat:latest
    container_name: webgoat
    profiles: ["lab"]
    restart: "no"
    environment:
      # Bind to 0.0.0.0 so the host UFW (not the JVM) controls exposure
      WEBGOAT_HOST: 0.0.0.0
      WEBWOLF_HOST: 0.0.0.0
      TZ: Europe/London
    ports:
      - "8080:8080"   # WebGoat lessons
      - "9090:9090"   # WebWolf companion (CSRF / open-redirect targets)
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/WebGoat/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Monitoring (same pattern as other nodes) ---

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
    ports:
      - "127.0.0.1:2375:2375"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
    ports:
      - "7007:7007"  # UFW restricts to 192.168.10.20 (optiplex) only
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
      DOCKER_HOST: "tcp://127.0.0.1:2375"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
