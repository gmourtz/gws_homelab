services:
  # --- AI Agent ---
  # Config (openclaw.json) is templated by Ansible into the named volume
  # — see stacks/openclaw.json.j2 and deploy-stacks.yml
  openclaw:
    image: ghcr.io/openclaw/openclaw:main
    container_name: openclaw
    restart: unless-stopped
    ports:
      # LAN gateway UI (also fronted by Tailscale Serve)
      - "18789:18789"
      # gcal OAuth re-auth callback (localhost-only, via SSH tunnel; token expires ~7d in Testing mode). Re-auth:
      #   docker exec -it openclaw env GOOGLE_OAUTH_CREDENTIALS=/home/node/.openclaw/gcal/gcp-oauth.keys.json \
      #     GOOGLE_CALENDAR_MCP_TOKEN_PATH=/home/node/.openclaw/gcal/tokens.json npx -y @cocal/google-calendar-mcp@2.6.1 auth
      - "127.0.0.1:3500:3500"
      - "127.0.0.1:3501:3501"
    volumes:
      - openclaw-data:/home/node/.openclaw
    environment:
      OPENAI_API_KEY: "{{ vault_openclaw_openai_api_key }}"
    mem_limit: 7g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x openclaw > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # No gcal-mcp service: the Calendar MCP runs as a stdio child of openclaw (see openclaw.json.j2).

  # --- Monitoring ---
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
    ports:
      - "127.0.0.1:2375:2375"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    restart: unless-stopped
    command: agent
    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
    ports:
      # central dozzle on optiplex aggregates openclaw.internal:7007
      - "7007:7007"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
      DOCKER_HOST: "tcp://127.0.0.1:2375"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  openclaw-data:
