services:
  # --- DNS & Ad Blocking ---
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: "Europe/London"
      WEBPASSWORD: "{{ vault_pihole_password }}"
      PIHOLE_DNS_1: "1.1.1.1"
      PIHOLE_DNS_2: "8.8.8.8"
      FTLCONF_dns_listeningMode: "all"
      # Pi-hole v6 local DNS — semicolon-separated "ip hostname [alias...]" entries
      # Source of truth: dns_records in inventory/group_vars/all/main.yml
      FTLCONF_dns_hosts: "{% for record in dns_records %}{{ record.ip }} {{ record.name }}.{{ local_domain }}{% if record.aliases is defined %}{% for alias in record.aliases %} {{ alias }}.{{ local_domain }}{% endfor %}{% endif %}{% if not loop.last %};{% endif %}{% endfor %}"
    volumes:
      - pihole-data:/etc/pihole
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/admin/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Monitoring ---
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
    ports:
      - "127.0.0.1:2375:2375"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
      DOCKER_HOST: "tcp://127.0.0.1:2375"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pihole-data:
