services:
  # --- DNS & Ad Blocking ---
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: "Europe/London"
      WEBPASSWORD: "{{ vault_pihole_password }}"
      PIHOLE_DNS_1: "1.1.1.1"
      PIHOLE_DNS_2: "8.8.8.8"
      DNSMASQ_LISTENING: all
    volumes:
      - pihole-data:/etc/pihole
      - pihole-dnsmasq:/etc/dnsmasq.d
    configs:
      - source: local-dns
        target: /etc/dnsmasq.d/02-local-dns.conf
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/admin/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Monitoring ---
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

configs:
  local-dns:
    content: |
      # Homelab local DNS — auto-generated from dns_records variable
      # To add entries, edit dns_records in inventory/group_vars/all/main.yml
{% for record in dns_records %}
      address=/{{ record.name }}.home/{{ record.name }}{% if record.aliases is defined %}{% for alias in record.aliases %}/{{ alias }}.home/{{ alias }}{% endfor %}{% endif %}/{{ record.ip }}
{% endfor %}

volumes:
  pihole-data:
  pihole-dnsmasq:
