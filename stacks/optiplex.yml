configs:
  caddyfile:
    content: |
      # HTTPS reverse proxy with internal CA — auto-generated from proxy_services + ondemand_services
      # Caddy issues self-signed certs from its own CA (stored in /data/caddy/pki/authorities/local/)
      # Clients must trust the root CA once; see docs for the one-time macOS trust step.

      # Catch-all HTTP → HTTPS redirect for all *.{{ local_domain }} hosts
      http://*.{{ local_domain }} {
        redir https://{host}{uri} permanent
      }

{% for svc in proxy_services %}
      https://{{ svc.name }}.{{ local_domain }} {
        tls internal
        reverse_proxy {{ svc.upstream }}
{% if svc.extra_headers is defined %}
        header {
{% for header_name, header_value in svc.extra_headers.items() %}
          {{ header_name }} "{{ header_value }}"
{% endfor %}
        }
{% endif %}
      }
{% endfor %}
{% for svc in ondemand_services | default([]) %}
      https://{{ svc.name }}.{{ local_domain }} {
        tls internal
        route /* {
          sablier http://sablier:10000 {
            group {{ svc.group }}
            session_duration {{ svc.session_duration }}
            dynamic {
              display_name {{ svc.name }}
              theme hacker-terminal
            }
          }
          reverse_proxy {{ svc.upstream }}
        }
      }
{% endfor %}
{% if vault_tailscale_jellyfin_authkey is defined %}
{% for svc in shared_services | default([]) %}
  {{ svc.name }}-ts-serve:
    # `$${TS_CERT_DOMAIN}` (doubled $) is required so Docker Compose passes the
    # literal `${TS_CERT_DOMAIN}` placeholder through to the file. The Tailscale
    # containerboot then substitutes it at runtime with the node's MagicDNS FQDN.
    # Without the doubling, Compose expands it at parse time → blank string → broken serve.
    content: |
      {
        "TCP": {"443": {"HTTPS": true}},
        "Web": {
          "$${TS_CERT_DOMAIN}:443": {
            "Handlers": {"/": {"Proxy": "http://{{ svc.upstream }}"}}
          }
        }
      }
{% endfor %}
{% endif %}

services:
  # --- Reverse proxy ---
  caddy:
    image: {{ ghcr_registry }}/gmourtz/caddy-sablier:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      sablier:
        condition: service_healthy
    networks:
      - sablier-net
      - beszel-net
      - jellyfin-net
      - audiobookshelf-net
      - stirling-pdf-net
      - it-tools-net
      - drawio-net
      - homepage-net
      - dozzle-net
      - jellyseerr-net
      - paperless-net
      - immich-net
      - uptime-kuma-net
      - actual-budget-net
      - navidrome-net
      - arr-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Sablier needs direct Docker socket access (not via docker-socket-proxy)
  # because it starts/stops containers — the proxy only allows read operations
  sablier:
    image: sablierapp/sablier:1.11.2
    container_name: sablier
    restart: unless-stopped
    command:
      - start
      - --provider.name=docker
      - --provider.auto-stop-on-startup
    networks:
      - sablier-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "/bin/sablier", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Monitoring ---
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    networks:
      - docker-proxy-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
      EVENTS: 1
      STATS: 1
    ports:
      - "127.0.0.1:2375:2375"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
      DOCKER_HOST: "tcp://127.0.0.1:2375"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    networks:
      - beszel-net
    volumes:
      - beszel-data:/beszel_data
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- YouTube Premium ---
  youtube-video-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-video-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-video-net
    volumes:
      - /mnt/media/videos:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HcggNZahqoXceJ5J0T8TuND
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "300"
      AUDIO_ONLY: "false"
      STATE_FILE_NAME: .downloaded_videos.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  youtube-music-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-music-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-music-net
    volumes:
      - /mnt/media/music:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HeEDddmsJymvg2TdwnpThug
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "60"
      AUDIO_ONLY: "true"
      AUDIO_FORMAT: flac
      STATE_FILE_NAME: .downloaded_music.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Portfolio agent ---
  portfolio-agent:
    image: ghcr.io/gmourtz/portfolio_agent:latest
    container_name: portfolio-agent
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - portfolio-net
    volumes:
      - portfolio-data:/data
    environment:
      T212_API_KEY: "{{ vault_t212_api_key }}"
      T212_API_SECRET: "{{ vault_t212_api_secret }}"
      T212_BASE_URL: "https://live.trading212.com/api/v0"
      OPENAI_API_KEY: "ollama"
      OPENAI_BASE_URL: "http://localllm.internal:11434/v1"
      OPENAI_MODEL: "qwen3:8b"
      FINNHUB_API_KEY: "{{ vault_finnhub_api_key | default('') }}"
      TELEGRAM_BOT_TOKEN: "{{ vault_telegram_bot_token }}"
      TELEGRAM_CHAT_ID: "{{ vault_telegram_chat_id }}"
      POLL_INTERVAL: "86400"
      TOP_N_FOR_NEWS: "5"
      DATA_DIR: "/data"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Arr media automation ---
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - arr-net
    environment:
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: "{{ vault_mullvad_wg_private_key }}"
      WIREGUARD_ADDRESSES: "{{ vault_mullvad_wg_addresses }}"
      SERVER_COUNTRIES: Netherlands
      TZ: "{{ timezone }}"
      FIREWALL_INPUT_PORTS: "8080,9696,7878,8989,8686,6767,6881"
      FIREWALL_OUTBOUND_SUBNETS: "10.10.0.0/16,172.16.0.0/12"
      HEALTH_VPN_DURATION_INITIAL: "120s"
      WIREGUARD_MTU: "1380"
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
      WEBUI_PORT: "8080"
    volumes:
      - qbittorrent-config:/config
      - /mnt/media:/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
    volumes:
      - prowlarr-config:/config
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
    volumes:
      - radarr-config:/config
      - /mnt/media:/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
    volumes:
      - sonarr-config:/config
      - /mnt/media:/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
    volumes:
      - lidarr-config:/config
      - /mnt/media:/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8686/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
    volumes:
      - bazarr-config:/config
      - /mnt/media:/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6767/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      TZ: "{{ timezone }}"
      LOG_LEVEL: info
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Personal website ---
  georgios-website:
    image: ghcr.io/gmourtz/georgios-website:latest
    container_name: georgios-website
    restart: unless-stopped
    networks:
      - website-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate --metrics 127.0.0.1:2000 run
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: "{{ vault_cf_tunnel_token }}"
    networks:
      - website-net
    depends_on:
      georgios-website:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Docker log viewer ---
  dozzle-agent:
    image: amir20/dozzle:latest
    container_name: dozzle-agent
    command: agent
    restart: unless-stopped
    networks:
      - docker-proxy-net
    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    networks:
      - dozzle-net
      - docker-proxy-net
    environment:
      DOZZLE_HOSTNAME: "optiplex"
      DOZZLE_REMOTE_AGENT: "dozzle-agent:7007,rpi3.{{ local_domain }}:7007,openclaw.{{ local_domain }}:7007,localllm.{{ local_domain }}:7007,kali.{{ local_domain }}:7007"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Media requests ---
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - jellyseerr-net
      - jellyfin-net
      - arr-net
    volumes:
      - jellyseerr-config:/app/config
    environment:
      TZ: "{{ timezone }}"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  musicseerr:
    image: ghcr.io/habirabbu/musicseerr:latest
    container_name: musicseerr
    restart: unless-stopped
    networks:
      - arr-net
      - navidrome-net
    volumes:
      - musicseerr-config:/app/config
      - musicseerr-cache:/app/cache
      - /mnt/media/music:/music:ro
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8688/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Document management ---
  paperless-redis:
    image: redis:7-alpine
    container_name: paperless-redis
    restart: unless-stopped
    networks:
      - paperless-net
    volumes:
      - paperless-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  paperless-ngx:
    # Custom image — Greek OCR pack baked in (paperless-net is internal, so the
    # base image's runtime apt language install can't reach mirrors). See apps/paperless-ngx/.
    image: ghcr.io/gmourtz/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    networks:
      - paperless-net
    depends_on:
      paperless-redis:
        condition: service_healthy
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - /mnt/media/paperless-consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: "redis://paperless-redis:6379"
      PAPERLESS_SECRET_KEY: "{{ vault_paperless_secret_key }}"
      PAPERLESS_URL: "https://paperless.{{ local_domain }}"
      PAPERLESS_CSRF_TRUSTED_ORIGINS: "https://paperless.{{ local_domain }}"
      PAPERLESS_USE_X_FORWARD_HOST: "true"
      PAPERLESS_USE_X_FORWARD_PORT: "true"
      PAPERLESS_PROXY_SSL_HEADER: '["HTTP_X_FORWARDED_PROTO", "https"]'
      PAPERLESS_TIME_ZONE: "{{ timezone }}"
      # PAPERLESS_OCR_LANGUAGES (runtime install) intentionally omitted —
      # tesseract-ocr-ell is baked into the custom image at build time.
      PAPERLESS_OCR_LANGUAGE: "eng+ell"
      PAPERLESS_OCR_USER_ARGS: '{"language": "eng+ell"}'
      PAPERLESS_ADMIN_USER: "{{ vault_paperless_admin_user }}"
      PAPERLESS_ADMIN_PASSWORD: "{{ vault_paperless_admin_password }}"
      USERMAP_UID: "1000"
      USERMAP_GID: "1000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  paperless-gpt:
    image: ghcr.io/icereed/paperless-gpt:latest
    container_name: paperless-gpt
    restart: unless-stopped
    networks:
      - paperless-net       # internal — talks to paperless-ngx + redis
      - paperless-gpt-ext   # non-internal — reaches Ollama on LAN
    depends_on:
      paperless-ngx:
        condition: service_healthy
    environment:
      PAPERLESS_BASE_URL: "http://paperless-ngx:8000"
      PAPERLESS_PUBLIC_URL: "https://paperless.internal"
      PAPERLESS_API_TOKEN: "{{ vault_paperless_api_token }}"
      LLM_PROVIDER: "ollama"
      LLM_MODEL: "qwen3:8b-fast"
      OLLAMA_HOST: "http://localllm.internal:11434"
      OLLAMA_CONTEXT_LENGTH: "16384"
      LLM_LANGUAGE: "English or Greek"
      LLM_REQUESTS_PER_MINUTE: "4"
      AUTO_TAG: "sys:paperless-gpt-auto"
      AUTO_GENERATE_TITLE: "true"
      AUTO_GENERATE_TAGS: "true"
      AUTO_GENERATE_CORRESPONDENTS: "false"   # disabled — LLM creates variants; no CREATE_NEW_CORRESPONDENTS gate exists
      AUTO_GENERATE_DOCUMENT_TYPE: "true"
      AUTO_GENERATE_CREATED_DATE: "true"
      CREATE_NEW_TAGS: "false"
      TOKEN_LIMIT: "2000"              # chars/4 fallback underestimates Greek text; 2000 keeps actual tokens ~2K
      CORRESPONDENT_BLACK_LIST: "Unknown"
      LOG_LEVEL: "info"
    volumes:
      - paperless-gpt-prompts:/app/prompts
      - paperless-gpt-config:/app/config
      - paperless-gpt-db:/app/db
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- Utilities ---
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    # Sablier-managed on-demand. `restart: "no"` so Docker doesn't fight Sablier's stop —
    # Sablier handles starts (on first request via Caddy) and stops (after idle timeout).
    restart: "no"
    networks:
      - stirling-pdf-net
    volumes:
      - stirling-pdf-data:/usr/share/tessdata
    environment:
      DOCKER_ENABLE_SECURITY: "false"
    labels:
      sablier.enable: "true"
      sablier.group: "stirling-pdf"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    networks:
      - it-tools-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    # Sablier-managed on-demand. `restart: "no"` so Docker doesn't fight Sablier's stop.
    restart: "no"
    networks:
      - drawio-net
    environment:
      DRAWIO_SELF_CONTAINED: "1"
    labels:
      sablier.enable: "true"
      sablier.group: "drawio"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Dashboard ---
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    networks:
      - homepage-net
      - docker-proxy-net  # access docker-socket-proxy for container status
      - beszel-net
      - jellyfin-net
      - audiobookshelf-net
      - jellyseerr-net
      - paperless-net
      - immich-net
      - uptime-kuma-net
      - actual-budget-net
      - arr-net
    volumes:
      - homepage-config:/app/config
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "homepage.{{ local_domain }}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Media server ---
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    networks:
      - audiobookshelf-net
    volumes:
      - audiobookshelf-config:/config
      - audiobookshelf-metadata:/metadata
      - /mnt/media/audiobooks:/audiobooks
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    networks:
      - navidrome-net
    environment:
      ND_LOGLEVEL: info
      ND_SCANSCHEDULE: "1h"
      ND_SESSIONTIMEOUT: "24h"
      ND_BASEURL: ""
      ND_ENABLEEXTERNALSERVICES: "true"
      ND_PLUGINS_ENABLED: "true"
      ND_PLUGINS_AUTORELOAD: "true"
{% if vault_lastfm_apikey is defined %}
      ND_LASTFM_APIKEY: "{{ vault_lastfm_apikey }}"
      ND_LASTFM_SECRET: "{{ vault_lastfm_secret }}"
{% endif %}
    volumes:
      - navidrome-data:/data
      - /mnt/media/music:/music/playlist:ro
      - /mnt/media/music-inbox:/music/inbox:ro
    mem_limit: 256m
    cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4533/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    group_add:
      - "993"  # render group GID on optiplex — access /dev/dri/renderD128 for Intel Quick Sync
    networks:
      - jellyfin-net
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - /mnt/media/videos:/media/videos:ro
      - /mnt/media/music:/media/music:ro
      - /mnt/media/movies:/media/movies:ro
      - /mnt/media/tv:/media/tv:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

{% if vault_tailscale_jellyfin_authkey is defined %}
  # Family/friends access via Tailscale node sharing. Each shared_services entry
  # gets its own sidecar that joins your tailnet as `<name>-share` and serves
  # the upstream over HTTPS at https://<name>-share.<your-tailnet>.ts.net.
  # Family members are invited per-node — they cannot see the rest of your
  # tailnet, and the strict ACL prevents sidecars from initiating outbound
  # connections within your tailnet. Setup + onboarding: docs/jellyfin-family-access.md
{% for svc in shared_services | default([]) %}
  {{ svc.name }}-tailscale:
    image: tailscale/tailscale:latest
    container_name: {{ svc.name }}-tailscale
    hostname: {{ svc.name }}-share
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - {{ svc.network }}
    volumes:
      - {{ svc.name }}-tailscale-state:/var/lib/tailscale
    configs:
      - source: {{ svc.name }}-ts-serve
        target: /config/serve.json
    environment:
      TS_AUTHKEY: "{{ vault_tailscale_jellyfin_authkey }}"
      TS_HOSTNAME: "{{ svc.name }}-share"
      TS_STATE_DIR: "/var/lib/tailscale"
      TS_SERVE_CONFIG: "/config/serve.json"
      TS_EXTRA_ARGS: "--advertise-tags=tag:family-share --accept-dns=false"
      TS_USERSPACE: "false"
      TS_AUTH_ONCE: "true"
    depends_on:
      {{ svc.name }}:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
{% endfor %}
{% endif %}

  # --- Photo management ---
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    networks:
      - immich-net
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "993"  # render group GID — Intel Quick Sync for video transcoding
    volumes:
      - /mnt/media/photos:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: "immich-postgres"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "{{ vault_immich_db_password }}"
      DB_DATABASE_NAME: "immich"
      REDIS_HOSTNAME: "immich-redis"
      IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning:3003"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:2283/api/server/ping', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    mem_limit: 2g
    networks:
      - immich-net
    volumes:
      - immich-model-cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:3003/ping\")'"]
      interval: 30s
      timeout: 5s
      retries: 3

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    networks:
      - immich-net
    volumes:
      - immich-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "{{ vault_immich_db_password }}"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "immich"
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d immich -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - immich-net
    volumes:
      - immich-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Finance ---
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    networks:
      - actual-budget-net
    volumes:
      - actual-budget-data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5006/',r=>process.exit(r.statusCode<500?0:1))\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Uptime monitoring ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - uptime-kuma-net
    # Use Pi-hole as primary DNS so monitors can resolve *.internal URLs.
    # Cloudflare as fallback so Telegram alerts can still fire if Pi-hole is down.
    dns:
      - "{{ hostvars['rpi3'].ansible_host }}"
      - 1.1.1.1
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

