configs:
  caddyfile:
    content: |
      # HTTP reverse proxy — auto-generated from proxy_services variable
{% for svc in proxy_services %}
      http://{{ svc.name }}.{{ local_domain }} {
        reverse_proxy {{ svc.upstream }}
      }
{% endfor %}
{% for svc in ondemand_services | default([]) %}
      http://{{ svc.name }}.{{ local_domain }} {
        route /* {
          sablier http://sablier:10000 {
            group {{ svc.group }}
            session_duration {{ svc.session_duration }}
            dynamic {
              display_name {{ svc.name }}
              theme hacker-terminal
            }
          }
          reverse_proxy {{ svc.upstream }}
        }
      }
{% endfor %}

services:
  # --- Reverse proxy ---
  caddy:
    image: {{ ghcr_registry }}/gmourtz/caddy-sablier:latest
    container_name: caddy
    restart: unless-stopped
    depends_on:
      sablier:
        condition: service_healthy
    networks:
      - sablier-net
      - beszel-net
      - jellyfin-net
      - audiobookshelf-net
      - stirling-pdf-net
      - it-tools-net
      - drawio-net
      - homepage-net
      - dozzle-net
      - jellyseerr-net
      - paperless-net
      - immich-net
      - uptime-kuma-net
      - actual-budget-net
    ports:
      - "80:80"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Sablier needs direct Docker socket access (not via docker-socket-proxy)
  # because it starts/stops containers — the proxy only allows read operations
  sablier:
    image: sablierapp/sablier:1.11.2
    container_name: sablier
    restart: unless-stopped
    command:
      - start
      - --provider.name=docker
      - --provider.auto-stop-on-startup
    networks:
      - sablier-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "/bin/sablier", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Monitoring ---
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    networks:
      - docker-proxy-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
    ports:
      - "127.0.0.1:2375:2375"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
      DOCKER_HOST: "tcp://127.0.0.1:2375"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    networks:
      - beszel-net
    volumes:
      - beszel-data:/beszel_data
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- YouTube Premium ---
  youtube-video-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-video-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-video-net
    volumes:
      - /mnt/media/videos:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HcggNZahqoXceJ5J0T8TuND
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "300"
      AUDIO_ONLY: "false"
      STATE_FILE_NAME: .downloaded_videos.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  youtube-music-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-music-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-music-net
    volumes:
      - /mnt/media/music:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HeEDddmsJymvg2TdwnpThug
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "300"
      AUDIO_ONLY: "true"
      AUDIO_FORMAT: flac
      STATE_FILE_NAME: .downloaded_music.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Portfolio agent ---
  portfolio-agent:
    image: ghcr.io/gmourtz/portfolio_agent:latest
    container_name: portfolio-agent
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - portfolio-net
    volumes:
      - portfolio-data:/data
    environment:
      T212_API_KEY: "{{ vault_t212_api_key }}"
      T212_API_SECRET: "{{ vault_t212_api_secret }}"
      T212_BASE_URL: "https://live.trading212.com/api/v0"
      OPENAI_API_KEY: "{{ vault_openai_api_key }}"
      OPENAI_MODEL: "gpt-4o"
      FINNHUB_API_KEY: "{{ vault_finnhub_api_key | default('') }}"
      TELEGRAM_BOT_TOKEN: "{{ vault_telegram_bot_token }}"
      TELEGRAM_CHAT_ID: "{{ vault_telegram_chat_id }}"
      POLL_INTERVAL: "86400"
      TOP_N_FOR_NEWS: "5"
      DATA_DIR: "/data"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Personal website ---
  georgios-website:
    image: ghcr.io/gmourtz/georgios-website:latest
    container_name: georgios-website
    restart: unless-stopped
    networks:
      - website-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate --metrics 127.0.0.1:2000 run
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: "{{ vault_cf_tunnel_token }}"
    networks:
      - website-net
    depends_on:
      georgios-website:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Docker log viewer ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    networks:
      - dozzle-net
      - docker-proxy-net
    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
      DOZZLE_HOSTNAME: "optiplex"
      DOZZLE_REMOTE_AGENT: "rpi3.{{ local_domain }}:7007,openclaw.{{ local_domain }}:7007"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Media requests ---
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    networks:
      - jellyseerr-net
      - jellyfin-net
    volumes:
      - jellyseerr-config:/app/config
    environment:
      TZ: "{{ timezone }}"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Document management ---
  paperless-redis:
    image: redis:7-alpine
    container_name: paperless-redis
    restart: unless-stopped
    networks:
      - paperless-net
    volumes:
      - paperless-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    networks:
      - paperless-net
    depends_on:
      paperless-redis:
        condition: service_healthy
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - /mnt/media/paperless-consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: "redis://paperless-redis:6379"
      PAPERLESS_SECRET_KEY: "{{ vault_paperless_secret_key }}"
      PAPERLESS_URL: "http://paperless.{{ local_domain }}"
      PAPERLESS_TIME_ZONE: "{{ timezone }}"
      PAPERLESS_OCR_LANGUAGE: "eng"
      PAPERLESS_ADMIN_USER: "{{ vault_paperless_admin_user }}"
      PAPERLESS_ADMIN_PASSWORD: "{{ vault_paperless_admin_password }}"
      USERMAP_UID: "1000"
      USERMAP_GID: "1000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Utilities ---
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    networks:
      - stirling-pdf-net
    volumes:
      - stirling-pdf-data:/usr/share/tessdata
    environment:
      DOCKER_ENABLE_SECURITY: "false"
    labels:
      sablier.enable: "true"
      sablier.group: "stirling-pdf"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    networks:
      - it-tools-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    restart: unless-stopped
    networks:
      - drawio-net
    environment:
      DRAWIO_SELF_CONTAINED: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Dashboard ---
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    networks:
      - homepage-net
      - docker-proxy-net  # access docker-socket-proxy for container status
      - beszel-net
      - jellyfin-net
      - audiobookshelf-net
      - jellyseerr-net
      - paperless-net
      - immich-net
      - uptime-kuma-net
      - actual-budget-net
    volumes:
      - homepage-config:/app/config
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "homepage.{{ local_domain }}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Media server ---
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    networks:
      - audiobookshelf-net
    volumes:
      - audiobookshelf-config:/config
      - audiobookshelf-metadata:/metadata
      - /mnt/media/audiobooks:/audiobooks
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    group_add:
      - "993"  # render group GID on optiplex — access /dev/dri/renderD128 for Intel Quick Sync
    networks:
      - jellyfin-net
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - /mnt/media/videos:/media/videos:ro
      - /mnt/media/music:/media/music:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Photo management ---
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    networks:
      - immich-net
    depends_on:
      immich-postgres:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "993"  # render group GID — Intel Quick Sync for video transcoding
    volumes:
      - /mnt/media/photos:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: "immich-postgres"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "{{ vault_immich_db_password }}"
      DB_DATABASE_NAME: "immich"
      REDIS_HOSTNAME: "immich-redis"
      IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning:3003"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:2283/api/server/ping', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    mem_limit: 2g
    networks:
      - immich-net
    volumes:
      - immich-model-cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:3003/ping\")'"]
      interval: 30s
      timeout: 5s
      retries: 3

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    restart: unless-stopped
    networks:
      - immich-net
    volumes:
      - immich-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "{{ vault_immich_db_password }}"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "immich"
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d immich -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks:
      - immich-net
    volumes:
      - immich-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Finance ---
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    networks:
      - actual-budget-net
    volumes:
      - actual-budget-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5006/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Uptime monitoring ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - uptime-kuma-net
    # Use Pi-hole as primary DNS so monitors can resolve *.internal URLs.
    # Cloudflare as fallback so Telegram alerts can still fire if Pi-hole is down.
    dns:
      - "{{ hostvars['rpi3'].ansible_host }}"
      - 1.1.1.1
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  beszel-net:
    driver: bridge
  youtube-video-net:
    driver: bridge
  youtube-music-net:
    driver: bridge
  portfolio-net:
    driver: bridge
  jellyfin-net:
    driver: bridge
  audiobookshelf-net:
    driver: bridge
  sablier-net:
    driver: bridge
  stirling-pdf-net:
    driver: bridge
  it-tools-net:
    driver: bridge
  drawio-net:
    driver: bridge
  homepage-net:
    driver: bridge
  docker-proxy-net:
    driver: bridge
  dozzle-net:
    driver: bridge
  jellyseerr-net:
    driver: bridge
  paperless-net:
    driver: bridge
  website-net:
    driver: bridge
  immich-net:
    driver: bridge
  uptime-kuma-net:
    driver: bridge
  actual-budget-net:
    driver: bridge

volumes:
  beszel-data:
  jellyfin-config:
  jellyfin-cache:
  audiobookshelf-config:
  audiobookshelf-metadata:
  stirling-pdf-data:
  homepage-config:
  jellyseerr-config:
  paperless-data:
  paperless-media:
  paperless-redis-data:
  immich-postgres-data:
  immich-model-cache:
  immich-redis-data:
  uptime-kuma-data:
  actual-budget-data:
  portfolio-data:

