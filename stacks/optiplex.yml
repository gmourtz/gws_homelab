configs:
  caddyfile:
    content: |
      # HTTP reverse proxy — auto-generated from proxy_services variable
{% for svc in proxy_services %}
      http://{{ svc.name }}.{{ local_domain }} {
        reverse_proxy {{ svc.upstream }}
      }
{% endfor %}

services:
  # --- Reverse proxy ---
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    networks:
      - beszel-net
      - jellyfin-net
      - audiobookshelf-net
      - stirling-pdf-net
    ports:
      - "80:80"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Monitoring ---
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
    ports:
      - "127.0.0.1:2375:2375"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
      DOCKER_HOST: "tcp://127.0.0.1:2375"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    networks:
      - beszel-net
    volumes:
      - beszel-data:/beszel_data
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- YouTube Premium ---
  youtube-video-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-video-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-video-net
    volumes:
      - /mnt/media/videos:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HcggNZahqoXceJ5J0T8TuND
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "300"
      AUDIO_ONLY: "false"
      STATE_FILE_NAME: .downloaded_videos.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  youtube-music-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-music-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-music-net
    volumes:
      - /mnt/media/music:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HeEDddmsJymvg2TdwnpThug
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "300"
      AUDIO_ONLY: "true"
      AUDIO_FORMAT: flac
      STATE_FILE_NAME: .downloaded_music.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Portfolio agent ---
  portfolio-agent:
    image: ghcr.io/gmourtz/portfolio_agent:latest
    container_name: portfolio-agent
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - portfolio-net
    volumes:
      - portfolio-data:/data
    environment:
      T212_API_KEY: "{{ vault_t212_api_key }}"
      T212_API_SECRET: "{{ vault_t212_api_secret }}"
      T212_BASE_URL: "https://live.trading212.com/api/v0"
      OPENAI_API_KEY: "{{ vault_openai_api_key }}"
      OPENAI_MODEL: "gpt-4o"
      FINNHUB_API_KEY: "{{ vault_finnhub_api_key | default('') }}"
      TELEGRAM_BOT_TOKEN: "{{ vault_telegram_bot_token }}"
      TELEGRAM_CHAT_ID: "{{ vault_telegram_chat_id }}"
      POLL_INTERVAL: "86400"
      TOP_N_FOR_NEWS: "5"
      DATA_DIR: "/data"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Personal website ---
  georgios-website:
    image: ghcr.io/gmourtz/georgios-website:latest
    container_name: georgios-website
    restart: unless-stopped
    networks:
      - website-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate --metrics 127.0.0.1:2000 run
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: "{{ vault_cf_tunnel_token }}"
    networks:
      - website-net
    depends_on:
      georgios-website:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Utilities ---
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    networks:
      - stirling-pdf-net
    volumes:
      - stirling-pdf-data:/usr/share/tessdata
    environment:
      DOCKER_ENABLE_SECURITY: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Media server ---
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    networks:
      - audiobookshelf-net
    volumes:
      - audiobookshelf-config:/config
      - audiobookshelf-metadata:/metadata
      - /mnt/media/audiobooks:/audiobooks
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    group_add:
      - "993"  # render group GID on optiplex — access /dev/dri/renderD128 for Intel Quick Sync
    networks:
      - jellyfin-net
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - /mnt/media/videos:/media/videos:ro
      - /mnt/media/music:/media/music:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  beszel-net:
    driver: bridge
  youtube-video-net:
    driver: bridge
  youtube-music-net:
    driver: bridge
  portfolio-net:
    driver: bridge
  jellyfin-net:
    driver: bridge
  audiobookshelf-net:
    driver: bridge
  stirling-pdf-net:
    driver: bridge
  website-net:
    driver: bridge

volumes:
  beszel-data:
  jellyfin-config:
  jellyfin-cache:
  audiobookshelf-config:
  audiobookshelf-metadata:
  stirling-pdf-data:
  portfolio-data:

