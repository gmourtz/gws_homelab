services:
  # --- Monitoring ---
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PORT: "45876"
      KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIE4wKKsidPkwxLodNHyivIN+9v+zfdT0DFZXrkDCUWJr"
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel-hub
    restart: unless-stopped
    networks:
      - beszel-net
    ports:
      - "8090:8090"
    volumes:
      - beszel-data:/beszel_data
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- YouTube Premium ---
  youtube-video-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-video-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-video-net
    volumes:
      - /mnt/media/videos:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HcggNZahqoXceJ5J0T8TuND
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "300"
      AUDIO_ONLY: "false"
      STATE_FILE_NAME: .downloaded_videos.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  youtube-music-downloader:
    image: ghcr.io/gmourtz/youtube_premium:latest
    container_name: youtube-music-downloader
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - youtube-music-net
    volumes:
      - /mnt/media/music:/videos
      - /mnt/media/youtube/token.json:/app/token.json
      - /mnt/media/youtube/client_secret.json:/app/client_secret.json:ro
    environment:
      PLAYLIST_ID: PLZskJ7oz20HeEDddmsJymvg2TdwnpThug
      VIDEOS_DIR: /videos
      TOKEN_FILE: token.json
      POLL_INTERVAL: "300"
      AUDIO_ONLY: "true"
      AUDIO_FORMAT: flac
      STATE_FILE_NAME: .downloaded_music.log
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Portfolio agent ---
  portfolio-agent:
    image: ghcr.io/gmourtz/portfolio_agent:latest
    container_name: portfolio-agent
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - portfolio-net
    volumes:
      - portfolio-data:/data
    environment:
      T212_API_KEY: "{{ vault_t212_api_key }}"
      T212_API_SECRET: "{{ vault_t212_api_secret }}"
      T212_BASE_URL: "https://live.trading212.com/api/v0"
      OPENAI_API_KEY: "{{ vault_openai_api_key }}"
      OPENAI_MODEL: "gpt-4o"
      FINNHUB_API_KEY: "{{ vault_finnhub_api_key | default('') }}"
      TELEGRAM_BOT_TOKEN: "{{ vault_telegram_bot_token }}"
      TELEGRAM_CHAT_ID: "{{ vault_telegram_chat_id }}"
      POLL_INTERVAL: "86400"
      TOP_N_FOR_NEWS: "5"
      DATA_DIR: "/data"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os, sys; sys.exit(0 if os.path.exists(\"/proc/1/cmdline\") else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Personal website ---
  georgios-website:
    image: ghcr.io/gmourtz/georgios-website:latest
    container_name: georgios-website
    restart: unless-stopped
    networks:
      - website-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token {{ vault_cf_tunnel_token }}
    restart: unless-stopped
    networks:
      - website-net
    depends_on:
      georgios-website:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2000/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Media server ---
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    networks:
      - jellyfin-net
    ports:
      - "8096:8096"
    volumes:
      - jellyfin-config:/config
      - /mnt/media/videos:/media/videos:ro
      - /mnt/media/music:/media/music:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  beszel-net:
    driver: bridge
  youtube-video-net:
    driver: bridge
  youtube-music-net:
    driver: bridge
  portfolio-net:
    driver: bridge
  jellyfin-net:
    driver: bridge
  website-net:
    driver: bridge

volumes:
  beszel-data:
  jellyfin-config:
  portfolio-data:

