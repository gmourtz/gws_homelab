---
# Deploy Docker Compose stacks to homelab hosts
#
# Each host has a single compose file: stacks/<hostname>.yml
# This playbook templates it to the host (resolving vault secrets)
# and runs docker compose up.
#
# Usage:
#   make stacks
#   ansible-playbook playbooks/deploy-stacks.yml
#   ansible-playbook playbooks/deploy-stacks.yml --limit optiplex

- name: Deploy stacks
  hosts: all:!routers
  become: true
  gather_facts: true

  vars:
    stacks_src: "{{ playbook_dir }}/../stacks"
    stacks_dest: /opt/stacks

  tasks:
    - name: Create stacks directory
      ansible.builtin.file:
        path: "{{ stacks_dest }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Template compose file to host
      ansible.builtin.template:
        src: "{{ stacks_src }}/{{ inventory_hostname }}.yml"
        dest: "{{ stacks_dest }}/docker-compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0600"

    - name: Log in to GHCR
      community.docker.docker_login:
        registry: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_token }}"
      when: ghcr_username is defined and ghcr_token is defined
      no_log: true

    - name: Pull and deploy stack
      community.docker.docker_compose_v2:
        project_src: "{{ stacks_dest }}"
        pull: always
        state: present

    - name: Configure Pi-hole allowlist
      ansible.builtin.command:
        cmd: docker exec pihole pihole allow {{ item }}
      loop: "{{ pihole_allowlist }}"
      when: pihole_allowlist is defined
      changed_when: false

    # --- OpenClaw post-deploy config (openclaw host only) ---
    - name: Get Tailscale FQDN for openclaw config
      ansible.builtin.command: tailscale status --json
      register: ts_status_full
      changed_when: false
      when: tailscale_serve_port is defined

    - name: Set Tailscale FQDN fact
      ansible.builtin.set_fact:
        tailscale_fqdn: "{{ (ts_status_full.stdout | from_json).Self.DNSName | regex_replace('\\.$', '') }}"
      when: tailscale_serve_port is defined

    - name: Write openclaw.json config to volume
      ansible.builtin.template:
        src: "{{ stacks_src }}/openclaw.json.j2"
        dest: /var/lib/docker/volumes/stacks_openclaw-data/_data/openclaw.json
        owner: "1000"
        group: "1000"
        mode: "0600"
      when: tailscale_serve_port is defined
      notify: Restart openclaw

    - name: Fix openclaw state dir permissions
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_openclaw-data/_data
        mode: "0700"
        owner: "1000"
        group: "1000"
      when: tailscale_serve_port is defined

  handlers:
    - name: Restart openclaw
      ansible.builtin.command: docker restart openclaw
      changed_when: true
