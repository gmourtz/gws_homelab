---
# Deploy Docker Compose stacks to homelab hosts
#
# Each host has a single compose file: stacks/<hostname>.yml
# This playbook templates it to the host (resolving vault secrets)
# and runs docker compose up.
#
# Usage:
#   make stacks
#   ansible-playbook playbooks/deploy-stacks.yml
#   ansible-playbook playbooks/deploy-stacks.yml --limit optiplex

- name: Deploy stacks
  hosts: all:!routers:!services
  become: true
  gather_facts: true

  vars:
    stacks_src: "{{ playbook_dir }}/../stacks"
    stacks_dest: /opt/stacks

  tasks:
    - name: Create stacks directory
      ansible.builtin.file:
        path: "{{ stacks_dest }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Template compose file to host
      ansible.builtin.template:
        src: "{{ stacks_src }}/{{ inventory_hostname }}.yml"
        dest: "{{ stacks_dest }}/docker-compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0600"
      register: compose_template

    - name: Log in to GHCR
      community.docker.docker_login:
        registry: ghcr.io
        username: "{{ ghcr_username }}"
        password: "{{ ghcr_token }}"
      when: ghcr_username is defined and ghcr_token is defined
      no_log: true

    # Wrapped in block/always so the Sablier auto-stop sweep below runs even if
    # `docker compose up` partially fails (e.g. a single unhealthy dependency
    # aborts the task after compose has already started all other containers,
    # including Sablier-managed ones). Without this, a failed deploy leaves
    # on-demand services (stirling-pdf, drawio) running indefinitely with no
    # sweep to stop them.
    - block:
        - name: Pull and deploy stack
          community.docker.docker_compose_v2:
            project_src: "{{ stacks_dest }}"
            pull: always
            state: present
            remove_orphans: true
          register: compose_deploy

        # The Caddyfile is embedded in the compose file via `configs:`, so changing
        # proxy_services or ondemand_services only changes file content — no service
        # block changes. Compose's auto-recreate doesn't detect this, so Caddy keeps
        # serving the stale config. Force-recreate only when the compose file changed.
        - name: Force-recreate Caddy to pick up Caddyfile content changes
          community.docker.docker_compose_v2:
            project_src: "{{ stacks_dest }}"
            services:
              - caddy
            state: present
            recreate: always
          when:
            - inventory_hostname == 'optiplex'
            - compose_template.changed
      always:
        # Sablier's `--provider.auto-stop-on-startup` only fires at Sablier's own boot.
        # When `docker compose up` (re)starts a Sablier-enabled container (stirling-pdf,
        # drawio) — whether triggered by a compose file edit or a new image pulled from
        # GHCR — Sablier never auto-stops the new container, so it sits idle indefinitely.
        # Restart Sablier whenever compose actually changed something (file edit OR image
        # pull OR container recreation) so its auto-stop sweep runs.
        # `compose_deploy` may be undefined when the deploy task itself errors before
        # registering, so default to false.
        # (Plain `docker restart` is more reliable here than docker_compose_v2's
        # `recreate: always` with a services filter, which silently no-ops in practice.)
        - name: Restart Sablier to re-run auto-stop-on-startup sweep
          ansible.builtin.command: docker restart sablier
          changed_when: true
          when:
            - inventory_hostname == 'optiplex'
            - compose_template.changed or (compose_deploy.changed | default(false))

    # --- Homepage config (optiplex only) ---
    - name: Ensure Homepage config directory exists in volume
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_homepage-config/_data
        state: directory
        mode: "0755"
      when: inventory_hostname == 'optiplex'

    - name: Write Homepage config files
      ansible.builtin.template:
        src: "{{ stacks_src }}/homepage/{{ item }}.j2"
        dest: /var/lib/docker/volumes/stacks_homepage-config/_data/{{ item }}
        mode: "0644"
      loop:
        - settings.yaml
        - widgets.yaml
        - services.yaml
        - docker.yaml
      when: inventory_hostname == 'optiplex'
      notify: Restart homepage

    # --- qBittorrent first-run init (optiplex only) ---
    # Templates qBittorrent.conf and categories.json into the volume *only if absent*.
    # On a fresh deploy this means qBittorrent boots with the vault password, save paths,
    # and categories already set — no manual UI setup. On an existing deploy this is a
    # no-op (the files already exist), so user UI tweaks are preserved.
    - name: Ensure qBittorrent config dir exists in volume
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_qbittorrent-config/_data/qBittorrent
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"
      when: inventory_hostname == 'optiplex'

    - name: Initialise qBittorrent.conf on first run
      ansible.builtin.template:
        src: "{{ stacks_src }}/qbittorrent.conf.j2"
        dest: /var/lib/docker/volumes/stacks_qbittorrent-config/_data/qBittorrent/qBittorrent.conf
        owner: "1000"
        group: "1000"
        mode: "0640"
        force: false  # only write if file doesn't exist — preserves user UI tweaks
      when:
        - inventory_hostname == 'optiplex'
        - vault_qbittorrent_password_hash is defined

    - name: Initialise qBittorrent categories.json on first run
      ansible.builtin.template:
        src: "{{ stacks_src }}/qbittorrent-categories.json.j2"
        dest: /var/lib/docker/volumes/stacks_qbittorrent-config/_data/qBittorrent/categories.json
        owner: "1000"
        group: "1000"
        mode: "0640"
        force: false
      when:
        - inventory_hostname == 'optiplex'
        - qbittorrent_categories is defined

    # --- Soulseek (slskd) + Soularr config (optiplex only) ---
    # Written into the service volumes after compose up. slskd auto-generates a
    # default slskd.yml on first start; we overwrite it with the vault-backed
    # config (force: true = source of truth) and restart so it takes effect.
    # Soularr re-reads config.ini each run. Both gated on vault_slskd_api_key,
    # the same key that gates the services in stacks/optiplex.yml.
    - name: Write slskd config to volume
      ansible.builtin.template:
        src: "{{ stacks_src }}/slskd.yml.j2"
        dest: /var/lib/docker/volumes/stacks_slskd-config/_data/slskd.yml
        owner: "1000"        # slskd drops to PUID 1000 (gosu)
        group: "1000"
        mode: "0640"
      when:
        - inventory_hostname == 'optiplex'
        - vault_slskd_api_key is defined
      notify: Restart slskd

    - name: Write Soularr config.ini to volume
      ansible.builtin.template:
        src: "{{ stacks_src }}/soularr.config.ini.j2"
        dest: /var/lib/docker/volumes/stacks_soularr-config/_data/config.ini
        mode: "0644"         # readable whatever uid the soularr image runs as
      when:
        - inventory_hostname == 'optiplex'
        - vault_slskd_api_key is defined
      notify: Restart soularr

    # --- Jellyseerr volume ownership (optiplex only) ---
    - name: Fix Jellyseerr config volume ownership
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_jellyseerr-config/_data
        state: directory
        owner: "1000"
        group: "1000"
        recurse: true
      when: inventory_hostname == 'optiplex'

    # --- Navidrome plugins (optiplex only) ---
    # Plugins land in the navidrome-data volume; ND_PLUGINS_AUTORELOAD picks them up
    # without a restart. After install, enable them via the web UI (Profile → Plugins).
    - name: Ensure Navidrome plugins directory exists in volume
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_navidrome-data/_data/plugins
        state: directory
        mode: "0755"
      when: inventory_hostname == 'optiplex'

    - name: Download Navidrome plugins
      ansible.builtin.get_url:
        url: "{{ item.url }}"
        dest: "/var/lib/docker/volumes/stacks_navidrome-data/_data/plugins/{{ item.name }}.ndp"
        mode: "0644"
      loop: "{{ navidrome_plugins }}"
      loop_control:
        label: "{{ item.name }}"
      when:
        - inventory_hostname == 'optiplex'
        - navidrome_plugins is defined

    # --- Jellyfin post-deploy config (optiplex only) ---
    - name: Ensure Jellyfin config directory exists in volume
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_jellyfin-config/_data/config
        state: directory
        mode: "0755"
      when: inventory_hostname == 'optiplex'

    - name: Write Jellyfin encoding config
      ansible.builtin.template:
        src: "{{ stacks_src }}/jellyfin-encoding.xml.j2"
        dest: /var/lib/docker/volumes/stacks_jellyfin-config/_data/config/encoding.xml
        mode: "0644"
      when: inventory_hostname == 'optiplex'
      notify: Restart jellyfin

    # --- Event scout config (optiplex only) ---
    # Topics/sources/thresholds rendered from the `event_scout_agent` var. The app
    # re-reads the file each cycle, but restart anyway so changes apply now.
    - name: Write event scout config to volume
      ansible.builtin.template:
        src: "{{ stacks_src }}/event-scout-agent-config.yml.j2"
        dest: /var/lib/docker/volumes/stacks_event-scout-agent-data/_data/config.yml
        mode: "0644"
      when:
        - inventory_hostname == 'optiplex'
        - event_scout_agent is defined
        - vault_event_scout_telegram_bot_token is defined
        - vault_event_scout_telegram_chat_id is defined
      notify: Restart event-scout-agent

    # --- Price monitor watchlist (optiplex only) ---
    - name: Write price monitor watchlist to volume
      ansible.builtin.copy:
        src: "{{ stacks_src }}/price-monitor-watchlist.json"
        dest: /var/lib/docker/volumes/stacks_price-monitor-data/_data/watchlist.json
        owner: "1000"
        group: "1000"
        mode: "0644"
      when: inventory_hostname == 'optiplex'
      notify: Restart price-monitor

    - name: Configure Pi-hole allowlist
      ansible.builtin.command:
        cmd: docker exec pihole pihole allow {{ item }}
      loop: "{{ pihole_allowlist }}"
      when: pihole_allowlist is defined
      changed_when: false

    # --- gluetun routing fix (optiplex only) ---
    # gluetun's ip rule 100 matches ALL traffic from the shared container IP
    # (every container in network_mode:service:gluetun shares gluetun's IP).
    # This routes arr/qBittorrent traffic to eth0 where the kill-switch blocks it.
    # Fix: replace rule 100 with a fwmark-conditional version so only gluetun's
    # own process (fwmark 0xca6c) goes via eth0 to reach the VPN server, while
    # all unmarked traffic (qBittorrent, arr containers) routes through tun0 (VPN tunnel).
    - name: Fix gluetun ip routing so arr containers route through VPN tunnel
      ansible.builtin.shell: |
        # Wait up to 5 min for gluetun to initialise its routing tables
        for i in $(seq 1 30); do
          docker exec gluetun ip rule list > /dev/null 2>&1 && break
          sleep 10
        done

        # Idempotency: already fixed when rule 100 has 'not fwmark'
        if docker exec gluetun ip rule list 2>/dev/null | grep -qE '^[[:space:]]*100:[[:space:]].*not.*fwmark'; then
          echo "already_fixed"
          exit 0
        fi

        # Get the lookup table used by the current rule 100 (typically 200 → eth0)
        ETH0_TABLE=$(docker exec gluetun ip rule list 2>/dev/null | \
          awk '/^[[:space:]]*100:/{for(i=1;i<=NF;i++){if($i=="lookup"){print $(i+1); exit}}}')
        ETH0_TABLE=${ETH0_TABLE:-200}

        # Remove the rule that incorrectly routes ALL container traffic to eth0
        docker exec gluetun ip rule del priority 100 2>/dev/null || true

        # Re-add with fwmark condition: only gluetun's own traffic goes to eth0 → VPN server
        docker exec gluetun ip rule add fwmark 0xca6c lookup "$ETH0_TABLE" priority 200 || true

        # All unmarked traffic (arr containers, qBittorrent) → table 51820 → tun0 → VPN tunnel
        docker exec gluetun ip rule add not fwmark 0xca6c lookup 51820 priority 100

        # Allow tun0-bound traffic through gluetun's iptables kill-switch
        docker exec gluetun iptables -C OUTPUT -o tun0 -j ACCEPT 2>/dev/null || \
          docker exec gluetun iptables -I OUTPUT 1 -o tun0 -j ACCEPT

        echo "changed"
      args:
        executable: /bin/bash
      register: _gluetun_route_fix
      changed_when: '"changed" in _gluetun_route_fix.stdout'
      when: inventory_hostname == 'optiplex'

    # --- Google Calendar MCP creds (openclaw host only) ---
    # OAuth client creds for the stdio gcal MCP, in the openclaw volume (uid 1000 so the npx child can read them).
    # The user token is placed once via `npx ... auth` and refreshed in place, so it is not managed here.
    - name: Ensure gcal dir exists in openclaw volume
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_openclaw-data/_data/gcal
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0700"
      when:
        - inventory_hostname == 'openclaw'
        - openclaw_gcal_mcp_enabled | default(false)
        - vault_gcal_oauth_credentials is defined

    - name: Write gcal OAuth client credentials into openclaw volume
      ansible.builtin.copy:
        content: "{{ vault_gcal_oauth_credentials }}"
        dest: /var/lib/docker/volumes/stacks_openclaw-data/_data/gcal/gcp-oauth.keys.json
        owner: "1000"
        group: "1000"
        mode: "0600"
      when:
        - inventory_hostname == 'openclaw'
        - openclaw_gcal_mcp_enabled | default(false)
        - vault_gcal_oauth_credentials is defined

    # --- OpenClaw post-deploy config (openclaw host only) ---
    - name: Get Tailscale FQDN for openclaw config
      ansible.builtin.command: tailscale status --json
      register: ts_status_full
      changed_when: false
      when:
        - tailscale_enabled | default(false)
        - tailscale_serve_port is defined

    - name: Set Tailscale FQDN fact
      ansible.builtin.set_fact:
        tailscale_fqdn: >-
          {{ (ts_status_full.stdout | from_json).Self.DNSName | regex_replace('\\.$', '')
             if (ts_status_full.rc | default(1)) == 0
             else (inventory_hostname ~ '.' ~ ansible_host) }}
      when:
        - tailscale_enabled | default(false)
        - tailscale_serve_port is defined

    - name: Write openclaw.json config to volume
      ansible.builtin.template:
        src: "{{ stacks_src }}/openclaw.json.j2"
        dest: /var/lib/docker/volumes/stacks_openclaw-data/_data/openclaw.json
        owner: "1000"
        group: "1000"
        mode: "0600"
      when:
        - tailscale_enabled | default(false)
        - tailscale_serve_port is defined
      notify: Recreate openclaw

    - name: Fix openclaw state dir permissions
      ansible.builtin.file:
        path: /var/lib/docker/volumes/stacks_openclaw-data/_data
        mode: "0700"
        owner: "1000"
        group: "1000"
      when:
        - tailscale_enabled | default(false)
        - tailscale_serve_port is defined

    # --- Ollama model pull (localllm only) ---
    # Ensures all models listed in ollama_models are downloaded.
    # Ollama starts empty — this makes model provisioning declarative.
    - name: List Ollama models already downloaded
      ansible.builtin.command: docker exec ollama ollama list
      register: _ollama_list
      changed_when: false
      when: ollama_models is defined

    - name: Pull missing Ollama models
      ansible.builtin.command: docker exec ollama ollama pull {{ item }}
      loop: "{{ ollama_models }}"
      when:
        - ollama_models is defined
        - item not in _ollama_list.stdout
      changed_when: true

    # --- Paperless-ngx taxonomy (optiplex only) ---
    # Append-only: POSTs each item to the API. Duplicates return 400 and are
    # silently ignored. To add new taxonomy items, append to the lists in
    # inventory/group_vars/all/main.yml and re-run `make stacks`.
    - name: Ensure Paperless document types exist
      ansible.builtin.command: >
        docker exec paperless-ngx curl -sf -X POST
        -H "Authorization: Token {{ vault_paperless_api_token }}"
        -H "Content-Type: application/json"
        -d '{"name": "{{ item }}"}'
        http://localhost:8000/api/document_types/
      loop: "{{ paperless_document_types | default([]) }}"
      loop_control:
        label: "{{ item }}"
      register: _pless_dt
      failed_when: _pless_dt.rc not in [0, 22]
      changed_when: _pless_dt.rc == 0
      when: inventory_hostname == 'optiplex'

    - name: Ensure Paperless tags exist
      ansible.builtin.command: >
        docker exec paperless-ngx curl -sf -X POST
        -H "Authorization: Token {{ vault_paperless_api_token }}"
        -H "Content-Type: application/json"
        -d '{"name": "{{ item }}"}'
        http://localhost:8000/api/tags/
      loop: "{{ paperless_tags | default([]) }}"
      loop_control:
        label: "{{ item }}"
      register: _pless_tag
      failed_when: _pless_tag.rc not in [0, 22]
      changed_when: _pless_tag.rc == 0
      when: inventory_hostname == 'optiplex'

    - name: Ensure Paperless correspondents exist
      ansible.builtin.command: >
        docker exec paperless-ngx curl -sf -X POST
        -H "Authorization: Token {{ vault_paperless_api_token }}"
        -H "Content-Type: application/json"
        -d '{"name": "{{ item }}"}'
        http://localhost:8000/api/correspondents/
      loop: "{{ paperless_correspondents | default([]) }}"
      loop_control:
        label: "{{ item }}"
      register: _pless_corr
      failed_when: _pless_corr.rc not in [0, 22]
      changed_when: _pless_corr.rc == 0
      when: inventory_hostname == 'optiplex'

    - name: Ensure Paperless custom fields exist
      ansible.builtin.command: >
        docker exec paperless-ngx curl -sf -X POST
        -H "Authorization: Token {{ vault_paperless_api_token }}"
        -H "Content-Type: application/json"
        -d '{"name": "{{ item.name }}", "data_type": "{{ item.data_type }}"}'
        http://localhost:8000/api/custom_fields/
      loop: "{{ paperless_custom_fields | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      register: _pless_cf
      failed_when: _pless_cf.rc not in [0, 22]
      changed_when: _pless_cf.rc == 0
      when: inventory_hostname == 'optiplex'

    # --- Miniflux feeds & categories (optiplex only) ---
    - name: Get Miniflux container info
      community.docker.docker_container_info:
        name: miniflux
      register: _miniflux_info
      when:
        - inventory_hostname == 'optiplex'
        - miniflux_feeds is defined

    - name: Set Miniflux container URL (host → bridge IP, bypassing Caddy)
      ansible.builtin.set_fact:
        _miniflux_url: "http://{{ (_miniflux_info.container.NetworkSettings.Networks | dict2items | first).value.IPAddress }}:8080"
      when:
        - inventory_hostname == 'optiplex'
        - miniflux_feeds is defined

    - name: Ensure Miniflux categories exist
      ansible.builtin.uri:
        url: "{{ _miniflux_url }}/v1/categories"
        method: POST
        user: admin
        password: "{{ vault_miniflux_admin_password }}"
        force_basic_auth: true
        body_format: json
        body:
          title: "{{ item }}"
        status_code: [201, 400]
      loop: "{{ miniflux_feeds | default([]) | map(attribute='category') | unique | list }}"
      loop_control:
        label: "{{ item }}"
      register: _miniflux_cat
      changed_when: _miniflux_cat.status == 201
      when:
        - inventory_hostname == 'optiplex'
        - miniflux_feeds is defined

    - name: Fetch Miniflux categories (for name→id lookup)
      ansible.builtin.uri:
        url: "{{ _miniflux_url }}/v1/categories"
        method: GET
        user: admin
        password: "{{ vault_miniflux_admin_password }}"
        force_basic_auth: true
        return_content: true
      register: _miniflux_cats
      changed_when: false
      when:
        - inventory_hostname == 'optiplex'
        - miniflux_feeds is defined

    - name: Build Miniflux category name→id map
      ansible.builtin.set_fact:
        _miniflux_cat_map: "{{ _miniflux_cats.json | items2dict(key_name='title', value_name='id') }}"
      when:
        - inventory_hostname == 'optiplex'
        - miniflux_feeds is defined

    - name: Ensure Miniflux feeds exist
      ansible.builtin.uri:
        url: "{{ _miniflux_url }}/v1/feeds"
        method: POST
        user: admin
        password: "{{ vault_miniflux_admin_password }}"
        force_basic_auth: true
        headers:
          Content-Type: application/json
        # body built as JSON string so category_id stays an int (Miniflux's Go
        # JSON parser rejects string ints). body_format: raw passes through.
        body: "{{ {'feed_url': item.url, 'category_id': _miniflux_cat_map[item.category]} | to_json }}"
        body_format: raw
        status_code: [201, 400]
      loop: "{{ miniflux_feeds | default([]) }}"
      loop_control:
        label: "{{ item.url }}"
      register: _miniflux_feed
      changed_when: _miniflux_feed.status == 201
      when:
        - inventory_hostname == 'optiplex'
        - miniflux_feeds is defined

  handlers:
    - name: Restart homepage
      ansible.builtin.command: docker restart homepage
      changed_when: true

    - name: Restart jellyfin
      ansible.builtin.command: docker restart jellyfin
      changed_when: true

    - name: Recreate openclaw
      # Force-recreate (not `docker restart`) so changed env/vault values actually land in the container.
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate --no-deps openclaw
        chdir: "{{ stacks_dest }}"
      changed_when: true

    - name: Restart price-monitor
      ansible.builtin.command: docker restart price-monitor
      changed_when: true

    - name: Restart event-scout-agent
      ansible.builtin.command: docker restart event-scout-agent
      changed_when: true

    - name: Restart slskd
      ansible.builtin.command: docker restart slskd
      changed_when: true

    - name: Restart soularr
      ansible.builtin.command: docker restart soularr
      changed_when: true


# -----------------------------------------------------------------------
# Uptime Kuma post-deploy config
#
# Runs locally against the Uptime Kuma API on optiplex. Skipped entirely
# if the Telegram bot vault var is missing — set the vault vars only
# AFTER the admin account has been created via the UI (one-time).
#
# Vault vars required:
#   vault_uptime_kuma_admin_user
#   vault_uptime_kuma_admin_password
#   vault_uptime_kuma_telegram_bot_token
#   vault_uptime_kuma_telegram_chat_id
#
# Python dep (install via `make setup`):
#   python -m pip install 'uptime-kuma-api>=1.2.0,<2.0.0'
# -----------------------------------------------------------------------
- name: Configure Uptime Kuma monitors and notifications
  hosts: uptime_kuma
  connection: local
  gather_facts: false
  become: false

  vars:
    # HTTPS via Caddy's self-signed internal CA — api_ssl_verify/validate_certs disabled below
    kuma_api_url: "https://uptime-kuma.{{ local_domain }}"
    kuma_enabled: "{{ vault_uptime_kuma_telegram_bot_token is defined }}"
    kuma_tag_colors:
      media:          "#3b82f6"   # blue
      tools:          "#22c55e"   # green
      monitoring:     "#f97316"   # orange
      infrastructure: "#8b5cf6"   # purple
      hosts:          "#ec4899"   # pink
      downloads:      "#f59e0b"   # amber
      ai:             "#14b8a6"   # teal

  module_defaults:
    lucasheld.uptime_kuma.monitor:
      api_url: "{{ kuma_api_url }}"
      api_username: "{{ vault_uptime_kuma_admin_user | default(omit) }}"
      api_password: "{{ vault_uptime_kuma_admin_password | default(omit) }}"
      api_ssl_verify: false
    lucasheld.uptime_kuma.notification:
      api_url: "{{ kuma_api_url }}"
      api_username: "{{ vault_uptime_kuma_admin_user | default(omit) }}"
      api_password: "{{ vault_uptime_kuma_admin_password | default(omit) }}"
      api_ssl_verify: false
    lucasheld.uptime_kuma.tag:
      api_url: "{{ kuma_api_url }}"
      api_username: "{{ vault_uptime_kuma_admin_user | default(omit) }}"
      api_password: "{{ vault_uptime_kuma_admin_password | default(omit) }}"
      api_wait_events: 2
      api_ssl_verify: false
    lucasheld.uptime_kuma.monitor_tag:
      api_url: "{{ kuma_api_url }}"
      api_username: "{{ vault_uptime_kuma_admin_user | default(omit) }}"
      api_password: "{{ vault_uptime_kuma_admin_password | default(omit) }}"
      api_wait_events: 2
      api_ssl_verify: false

  tasks:
    - name: Wait for Uptime Kuma HTTP API to be ready
      ansible.builtin.uri:
        url: "{{ kuma_api_url }}"
        status_code: [200, 302]
        validate_certs: false
      register: kuma_check
      until: kuma_check.status in [200, 302]
      retries: 30
      delay: 2
      when: kuma_enabled

    - name: Remove deprecated Uptime Kuma monitors
      lucasheld.uptime_kuma.monitor:
        name: "{{ item }}"
        state: absent
      loop: "{{ removed_kuma_monitors | default([]) }}"
      loop_control:
        label: "{{ item }}"
      when: kuma_enabled

    - name: Add Telegram notification channel
      lucasheld.uptime_kuma.notification:
        name: telegram-homelab
        type: telegram
        isDefault: true
        applyExisting: true
        telegramBotToken: "{{ vault_uptime_kuma_telegram_bot_token }}"
        telegramChatID: "{{ vault_uptime_kuma_telegram_chat_id }}"
        state: present
      when: kuma_enabled
      no_log: true

    - name: Create monitor tags
      lucasheld.uptime_kuma.tag:
        name: "{{ item.key }}"
        color: "{{ item.value }}"
        state: present
      loop: "{{ kuma_tag_colors | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      when: kuma_enabled

    - name: Add HTTP monitors for proxied services
      lucasheld.uptime_kuma.monitor:
        name: "{{ item.name }}"
        type: http
        url: "https://{{ item.name }}.{{ local_domain }}/"
        ignoreTls: true  # Caddy serves a self-signed internal CA cert
        interval: 60
        retryInterval: 20
        maxretries: 2
        notification_names: ["telegram-homelab"]
        state: present
      loop: "{{ proxy_services }}"
      loop_control:
        label: "{{ item.name }}"
        pause: 5
      when: kuma_enabled
      no_log: true

    - name: Tag proxied service monitors
      lucasheld.uptime_kuma.monitor_tag:
        monitor_name: "{{ item.name }}"
        tag_name: "{{ item.tag }}"
        state: present
      loop: "{{ proxy_services }}"
      loop_control:
        label: "{{ item.name }}"
        pause: 5
      register: tag_result
      retries: 5
      delay: 15
      until: tag_result is not failed
      when: kuma_enabled

    # Intentionally NOT monitored: on-demand services (Sablier-managed).
    # An HTTP monitor that polls every 60s would keep them permanently warm via
    # Caddy's Sablier middleware (each poll is a "request" → Sablier starts the
    # container → 30 min session keeps it alive → next poll resets the timer).
    # The whole point of on-demand is "off when idle"; monitoring breaks that.
    # Add a manual smoke test (curl + ad-hoc) when you suspect they're broken.

    - name: Add TCP port 22 monitors for hosts (SSH reachability)
      lucasheld.uptime_kuma.monitor:
        name: "{{ item.name }} (ssh)"
        type: port
        hostname: "{{ item.ip }}"
        port: 22
        interval: 60
        retryInterval: 20
        maxretries: 2
        notification_names: ["telegram-homelab"]
        state: present
      loop: "{{ dns_records }}"
      loop_control:
        label: "{{ item.name }}"
      when: kuma_enabled
      no_log: true

    - name: Tag host monitors
      lucasheld.uptime_kuma.monitor_tag:
        monitor_name: "{{ item.name }} (ssh)"
        tag_name: "{{ item.tag }}"
        state: present
      loop: "{{ dns_records }}"
      loop_control:
        label: "{{ item.name }}"
        pause: 5
      register: tag_result
      retries: 5
      delay: 15
      until: tag_result is not failed
      when: kuma_enabled
