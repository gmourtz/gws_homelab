---
# First-time setup — run once after flashing
#
# Usage:
#   make bootstrap
#   ansible-playbook playbooks/bootstrap.yml -e "ansible_user=ubuntu"

- name: Bootstrap homelab nodes
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Create admin user with sudo
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        append: true
        shell: /bin/bash

    - name: Add SSH key
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        key: "{{ admin_ssh_pubkey }}"

    - name: Passwordless sudo
      ansible.builtin.copy:
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ admin_user }}"
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Disable SSH password auth & root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
        - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted
