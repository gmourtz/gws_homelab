---
# Configure MikroTik hAP ac² via RouterOS API
#
# Idempotent — every task sets the complete desired state of a RouterOS path.
# api_modify with handle_absent_entries: remove removes any entries not in the list.
#
# Prerequisites (one-time manual bootstrap — see docs/network-design.md):
#   1. Factory reset (with or without no-defaults)
#   2. Laptop → ether2, static IP 192.168.88.2/24
#   3. ssh admin@192.168.88.1 → set password (must match vault_routeros_api_password)
#   4. /ip service enable api
#
# First run (from factory defaults):
#   ansible-playbook playbooks/configure-routeros.yml -e ansible_host=192.168.88.1
#   → Configures everything; last task enables VLAN filtering and may time out.
#   → Router IS fully configured.  Change laptop IP to 192.168.10.x/24.
#
# Second run (verify + finalise):
#   ansible-playbook playbooks/configure-routeros.yml -e ansible_host=192.168.10.1
#   → Removes bootstrap IP, tightens firewall + IP service restrictions,
#     confirms full idempotency.

- name: Configure MikroTik RouterOS
  hosts: mikrotik
  gather_facts: false
  become: false

  module_defaults:
    group/community.routeros.api:
      hostname: "{{ ansible_host }}"
      username: "{{ routeros_api_username }}"
      password: "{{ vault_routeros_api_password }}"
      timeout: "{{ routeros_api_timeout | default(30) }}"

  tasks:
    # -----------------------------------------------------------------------
    # 0. Factory-default bridge migration
    #
    # A regular factory reset creates a bridge named "bridge" with ether2–5.
    # Rename it to "bridge1" so existing port entries stay intact — avoids
    # removing ether2 from the bridge (which kills the management path).
    # On a no-defaults reset or subsequent runs this is a no-op.
    # -----------------------------------------------------------------------
    - name: Rename default bridge to bridge1 (factory-default migration)
      community.routeros.api_find_and_modify:
        path: interface bridge
        find:
          name: bridge
        values:
          name: bridge1
        allow_no_matches: true

    # -----------------------------------------------------------------------
    # 1. System identity + timezone
    # -----------------------------------------------------------------------
    - name: Set system identity
      community.routeros.api_modify:
        path: system identity
        data:
          - name: "{{ routeros_hostname }}"

    - name: Set system clock timezone
      community.routeros.api_modify:
        path: system clock
        data:
          - time-zone-name: "{{ routeros_timezone }}"

    # -----------------------------------------------------------------------
    # 2. WAN — DHCP client on ether1 (gets IP + default route from ZTE)
    # -----------------------------------------------------------------------
    - name: Configure WAN DHCP client on ether1
      community.routeros.api_modify:
        path: ip dhcp-client
        handle_absent_entries: remove
        data:
          - interface: ether1
            disabled: false
            add-default-route: true
            use-peer-dns: false
            use-peer-ntp: false
            comment: "WAN - DHCP from ZTE"

    # -----------------------------------------------------------------------
    # 3. NTP
    # -----------------------------------------------------------------------
    - name: Configure NTP client
      community.routeros.api_modify:
        path: system ntp client
        data:
          - enabled: true
            servers: "{{ routeros_ntp_servers | join(',') }}"

    # -----------------------------------------------------------------------
    # 4. DNS upstream
    # -----------------------------------------------------------------------
    - name: Configure DNS
      community.routeros.api_modify:
        path: ip dns
        data:
          - servers: "{{ routeros_dns_servers | join(',') }}"
            allow-remote-requests: "{{ routeros_dns_allow_remote_requests }}"

    # -----------------------------------------------------------------------
    # 5. Bridge (bridge1)
    # NOTE: Do NOT set vlan-filtering here. On first run the factory bridge
    # defaults to vlan-filtering=no, which is what we want while ports and
    # the VLAN table are reconfigured. The final "Enable bridge VLAN filtering"
    # task performs the cutover. On subsequent runs vlan-filtering is already
    # true — toggling it off here would break the VLAN 10 management path
    # (bridge1.10) and hang the API until timeout.
    # -----------------------------------------------------------------------
    - name: Configure bridge
      community.routeros.api_modify:
        path: interface bridge
        data:
          - name: bridge1
            comment: "LAN bridge with VLAN filtering"

    # -----------------------------------------------------------------------
    # 6. Bridge ports — ether2-5 are untagged access (pvid 10);
    #    wifi1/wifi2 are tagged trunks (virtual APs tag via datapath vlan-id)
    # -----------------------------------------------------------------------
    # NOTE: Do NOT use handle_absent_entries: remove or ensure_order here.
    # api_modify with remove + ensure_order deletes all bridge ports then re-adds
    # them; removing ether2 from the bridge kills the management path (192.168.88.1
    # lives on the bridge) and the API connection times out.
    # Without those flags the module updates existing entries in-place.
    - name: Configure bridge ports
      community.routeros.api_modify:
        path: interface bridge port
        data:
          - { interface: ether2, bridge: bridge1, pvid: 10, frame-types: admit-only-untagged-and-priority-tagged }
          - { interface: ether3, bridge: bridge1, pvid: 10, frame-types: admit-only-untagged-and-priority-tagged }
          - { interface: ether4, bridge: bridge1, pvid: 10, frame-types: admit-only-untagged-and-priority-tagged }
          - { interface: ether5, bridge: bridge1, pvid: 10, frame-types: admit-only-untagged-and-priority-tagged }
          - { interface: wifi1,  bridge: bridge1, frame-types: admit-only-vlan-tagged }
          - { interface: wifi2,  bridge: bridge1, frame-types: admit-only-vlan-tagged }

    # -----------------------------------------------------------------------
    # 7. Bridge VLAN table (static — tagged/untagged membership differs per VLAN)
    #    wifi1/wifi2 are tagged trunks; their per-VLAN membership is derived from
    #    which SSIDs exist on each band (see wifi_ssids in host_vars).
    # -----------------------------------------------------------------------
    - name: Configure bridge VLAN table
      community.routeros.api_modify:
        path: interface bridge vlan
        handle_absent_entries: remove
        ensure_order: true
        data:
          - bridge: bridge1
            vlan-ids: "10"
            untagged: "ether2,ether3,ether4,ether5"
            tagged: "bridge1,wifi1,wifi2"     # GWS-Home on both bands
            comment: "VLAN 10 - Trusted"

          - bridge: bridge1
            vlan-ids: "20"
            tagged: "bridge1,wifi1"           # GWS-IoT on 2.4 GHz only
            comment: "VLAN 20 - IoT"

          - bridge: bridge1
            vlan-ids: "30"
            tagged: "bridge1,wifi1,wifi2"     # GWS-Guest on both bands
            comment: "VLAN 30 - Guest"

          - bridge: bridge1
            vlan-ids: "40"
            tagged: "bridge1,wifi1"           # GWS-Agent on 2.4 GHz only
            comment: "VLAN 40 - Agent"

    # -----------------------------------------------------------------------
    # 8. VLAN interfaces (bridge1.10 / .20 / .30)
    # -----------------------------------------------------------------------
    - name: Configure VLAN interfaces
      community.routeros.api_modify:
        path: interface vlan
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _vlan_ifaces }}"
      vars:
        _vlan_ifaces: >-
          {%- set result = [] -%}
          {%- for v in vlans -%}
            {%- set _ = result.append({
              'name': 'bridge1.' ~ v.id,
              'vlan-id': v.id,
              'interface': 'bridge1',
              'comment': 'VLAN ' ~ v.id ~ ' - ' ~ v.name
            }) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 9. IP addresses (gateway IPs on each VLAN interface)
    #    During the first run from 192.168.88.1 we keep the bootstrap IP on
    #    bridge1 so the management connection survives until VLAN cutover.
    #    On the second run (from 192.168.10.1) handle_absent_entries: remove
    #    cleans it up automatically.
    # -----------------------------------------------------------------------
    - name: Set IP addresses on VLAN interfaces
      community.routeros.api_modify:
        path: ip address
        handle_absent_entries: remove
        data: "{{ _ip_addresses + _bootstrap_ip }}"
      vars:
        _bootstrap_ip: >-
          {{ [{'address': '192.168.88.1/24',
               'interface': 'bridge1',
               'comment': 'bootstrap management - removed after cutover'}]
             if ansible_host == '192.168.88.1' else [] }}
        _ip_addresses: >-
          {%- set result = [] -%}
          {%- for v in vlans -%}
            {%- set prefix = v.subnet.split('/')[1] -%}
            {%- set _ = result.append({
              'address': v.gateway ~ '/' ~ prefix,
              'interface': 'bridge1.' ~ v.id,
              'comment': 'VLAN ' ~ v.id ~ ' gateway'
            }) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 10. DHCP pools
    # -----------------------------------------------------------------------
    - name: Configure DHCP address pools
      community.routeros.api_modify:
        path: ip pool
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _dhcp_pools }}"
      vars:
        _dhcp_pools: >-
          {%- set result = [] -%}
          {%- for v in vlans -%}
            {%- set _ = result.append({
              'name': v.dhcp_pool_name,
              'ranges': v.dhcp_range_start ~ '-' ~ v.dhcp_range_end
            }) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 11. DHCP servers
    # -----------------------------------------------------------------------
    - name: Configure DHCP servers
      community.routeros.api_modify:
        path: ip dhcp-server
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _dhcp_servers }}"
      vars:
        _dhcp_servers: >-
          {%- set result = [] -%}
          {%- for v in vlans -%}
            {%- set _ = result.append({
              'name': 'dhcp-' ~ v.name,
              'interface': 'bridge1.' ~ v.id,
              'address-pool': v.dhcp_pool_name,
              'disabled': false
            }) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 12. DHCP server networks (gateway + DNS per VLAN)
    # -----------------------------------------------------------------------
    - name: Configure DHCP server networks
      community.routeros.api_modify:
        path: ip dhcp-server network
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _dhcp_networks }}"
      vars:
        _dhcp_networks: >-
          {%- set result = [] -%}
          {%- for v in vlans -%}
            {%- set entry = {
              'address': v.subnet,
              'gateway': v.gateway,
              'dns-server': v.dns_servers | join(','),
              'comment': 'VLAN ' ~ v.id ~ ' - ' ~ v.name
            } -%}
            {%- if v.domain is defined -%}
              {%- set _ = entry.update({'domain': v.domain}) -%}
            {%- endif -%}
            {%- set _ = result.append(entry) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 13. DHCP static leases
    # -----------------------------------------------------------------------
    - name: Configure DHCP static leases
      community.routeros.api_modify:
        path: ip dhcp-server lease
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _leases }}"
      vars:
        _leases: >-
          {%- set result = [] -%}
          {%- for lease in dhcp_static_leases -%}
            {%- set _ = result.append({
              'server': lease.server,
              'mac-address': lease.mac_address,
              'address': lease.ip_address,
              'comment': lease.comment
            }) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 14. Firewall filter rules (ordered, exact state)
    #     During bootstrap from 192.168.88.0/24 we prepend a temporary accept
    #     rule so management traffic isn't dropped.  Second run removes it.
    # -----------------------------------------------------------------------
    - name: Configure firewall filter rules
      community.routeros.api_modify:
        path: ip firewall filter
        handle_absent_entries: remove
        handle_entries_content: remove
        ensure_order: true
        data: "{{ _bootstrap_fw + firewall_filter_rules }}"
      vars:
        _bootstrap_fw: >-
          {{ [{'chain': 'input',
               'action': 'accept',
               'comment': 'bootstrap management (temporary)',
               'src-address': '192.168.88.0/24'}]
             if ansible_host == '192.168.88.1' else [] }}

    # -----------------------------------------------------------------------
    # 15. Firewall NAT rules
    # -----------------------------------------------------------------------
    - name: Configure firewall NAT rules
      community.routeros.api_modify:
        path: ip firewall nat
        handle_absent_entries: remove
        handle_entries_content: remove
        ensure_order: true
        data: "{{ firewall_nat_rules }}"

    # -----------------------------------------------------------------------
    # 16. IP services (restrict or disable)
    # -----------------------------------------------------------------------
    # During bootstrap from 192.168.88.0/24 we widen address restrictions
    # so the API connection isn't rejected.  Second run applies final state.
    - name: Configure IP services
      community.routeros.api_modify:
        path: ip service
        data: "{{ _services }}"
      vars:
        _services: >-
          {%- set result = [] -%}
          {%- for svc in routeros_services -%}
            {%- if ansible_host == '192.168.88.1' and svc.address is defined -%}
              {%- set _ = result.append(svc | combine({'address': svc.address ~ ',192.168.88.0/24'})) -%}
            {%- else -%}
              {%- set _ = result.append(svc) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 17. Disable IPv6 package (skip — disabled by default on no-defaults reset)
    # -----------------------------------------------------------------------

    # -----------------------------------------------------------------------
    # 18. Disable bandwidth-server and UPnP
    # -----------------------------------------------------------------------
    - name: Disable bandwidth-server
      community.routeros.api_modify:
        path: tool bandwidth-server
        data:
          - enabled: false

    - name: Disable UPnP
      community.routeros.api_modify:
        path: ip upnp
        data:
          - enabled: false

    # -----------------------------------------------------------------------
    # 19. WiFi security profiles (RouterOS 7 wifi package)
    # -----------------------------------------------------------------------
    - name: Configure WiFi security profiles
      community.routeros.api_modify:
        path: interface wifi security
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _security_profiles }}"
      no_log: true
      ignore_errors: true  # WiFi radio restarts on profile changes, dropping the API connection; change is applied despite timeout
      vars:
        _security_profiles: >-
          {%- set result = [] -%}
          {%- for ssid in wifi_ssids -%}
            {%- set _ = result.append({
              'name': 'sec-' ~ ssid.ssid | lower | replace(' ', '-'),
              'authentication-types': ssid.security_mode,
              'passphrase': vars[ssid.vault_passphrase_var]
            }) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 19b. WiFi configuration profiles — SSID per profile
    # -----------------------------------------------------------------------
    - name: Configure WiFi configuration profiles
      community.routeros.api_modify:
        path: interface wifi configuration
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _config_profiles }}"
      vars:
        _config_profiles: >-
          {%- set result = [] -%}
          {%- for ssid in wifi_ssids -%}
            {%- set slug = ssid.ssid | lower | replace(' ', '-') -%}
            {%- set _ = result.append({
              'name': 'cfg-' ~ slug,
              'ssid': ssid.ssid
            }) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 19c. WiFi datapath profiles — one per SSID for VLAN tagging
    # -----------------------------------------------------------------------
    - name: Configure WiFi datapath profiles
      community.routeros.api_modify:
        path: interface wifi datapath
        handle_absent_entries: remove
        ensure_order: true
        data: "{{ _datapath_profiles }}"
      vars:
        _datapath_profiles: >-
          {%- set result = [] -%}
          {%- for ssid in wifi_ssids -%}
            {%- set slug = ssid.ssid | lower | replace(' ', '-') -%}
            {%- set entry = {
              'name': 'dp-' ~ slug,
              'bridge': 'bridge1',
              'vlan-id': ssid.vlan_id,
              'client-isolation': ssid.client_isolation | default(false)
            } -%}
            {%- set _ = result.append(entry) -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 19d. Clear default SSID from master WiFi interfaces
    #
    # Factory defaults leave wifi1/wifi2 broadcasting "MikroTik-XXXXXX".
    # Remove their configuration profile so only the virtual APs below are
    # active.  The physical interfaces stay enabled (required by virtual APs).
    # -----------------------------------------------------------------------
    - name: Get master WiFi interface IDs
      community.routeros.api:
        path: interface wifi
        query: ".id name"
      register: wifi_interfaces

    - name: Clear default SSID from master WiFi interfaces
      community.routeros.api:
        path: interface wifi
        cmd: "unset .id={{ item['.id'] }} value-name=configuration"
      loop: "{{ wifi_interfaces.msg | selectattr('name', 'in', ['wifi1', 'wifi2']) | list }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    # -----------------------------------------------------------------------
    # 20. WiFi virtual APs — all bands (2.4 GHz wifi1 + 5 GHz wifi2)
    # -----------------------------------------------------------------------
    # NOTE: Do NOT use handle_absent_entries: remove or ensure_order here.
    # Physical radio interfaces (wifi1, wifi2) are permanent built-in entries
    # that RouterOS will not allow removing, and ensure_order requires remove.
    # We only create/update virtual APs.
    - name: Configure WiFi virtual APs
      community.routeros.api_modify:
        path: interface wifi
        data: "{{ _vaps }}"
      vars:
        _vaps: >-
          {%- set result = [] -%}
          {%- for ssid in wifi_ssids -%}
            {%- set slug = ssid.ssid | lower | replace(' ', '-') -%}
            {%- if ssid.band_2ghz -%}
              {%- set _ = result.append({
                'name': 'wifi1-' ~ slug,
                'master-interface': 'wifi1',
                'configuration': 'cfg-' ~ slug,
                'security': 'sec-' ~ slug,
                'datapath': 'dp-' ~ slug,
                'disabled': false
              }) -%}
            {%- endif -%}
            {%- if ssid.band_5ghz -%}
              {%- set _ = result.append({
                'name': 'wifi2-' ~ slug,
                'master-interface': 'wifi2',
                'configuration': 'cfg-' ~ slug,
                'security': 'sec-' ~ slug,
                'datapath': 'dp-' ~ slug,
                'disabled': false
              }) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ result }}

    # -----------------------------------------------------------------------
    # 21. VLAN cutover  (MUST be the last task)
    #
    # Enabling VLAN filtering changes traffic forwarding: untagged frames
    # on ether2 get tagged with PVID 10 and routed to bridge1.10.  The
    # bootstrap IP (192.168.88.1 on bridge1 master) becomes unreachable.
    #
    # On the FIRST run (from 192.168.88.1) this task will likely time out
    # because the management connection dies.  RouterOS still applies the
    # change — the router IS configured.  Reconnect from the new subnet:
    #
    #   1. Change laptop IP to 192.168.10.x/24 (or enable DHCP)
    #   2. ansible-playbook playbooks/configure-routeros.yml \
    #          -e ansible_host=192.168.10.1
    #
    # That second run converges the last bits (removes stale bootstrap IP,
    # tightens firewall + IP service restrictions) and verifies idempotency.
    # -----------------------------------------------------------------------
    - name: Enable bridge VLAN filtering (cutover — may drop connection on first run)
      community.routeros.api_modify:
        path: interface bridge
        data:
          - name: bridge1
            vlan-filtering: true
            comment: "LAN bridge with VLAN filtering"
      ignore_errors: "{{ ansible_host == '192.168.88.1' }}"
