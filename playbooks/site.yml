---
# Site playbook — configures all homelab hosts (OS-level only)
#
# This playbook handles host configuration: packages, SSH, firewall,
# fail2ban, auto-updates, and Docker engine.
#
# Container workloads are deployed separately via:
#   make stacks  (runs playbooks/deploy-stacks.yml)
#
# Usage:
#   make deploy
#   ansible-playbook playbooks/site.yml --limit rpi3

- name: Configure homelab
  hosts: all:!routers
  become: true
  gather_facts: true

  tasks:
    # --- Packages ---
    - name: Update apt & install packages
      ansible.builtin.apt:
        name: "{{ packages + (extra_packages | default([])) }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
        cache_valid_time: 3600

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    # --- DNS (free port 53 for Pi-hole) ---
    - name: Disable systemd-resolved stub listener
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: "^#?DNSStubListener"
        line: "DNSStubListener=no"
      when: disable_resolved_stub | default(false)
      notify: Restart systemd-resolved

    - name: Point resolv.conf to systemd-resolved full resolver
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      when: disable_resolved_stub | default(false)

    - name: Populate /etc/hosts from dns_records
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: ".*# homelab: {{ item.name }}$"
        line: "{{ item.ip }}  {{ item.name }}.{{ local_domain }} {{ item.name }} {{ item.aliases | default([]) | map('regex_replace', '^(.*)$', '\\1.' ~ local_domain ~ ' \\1') | join(' ') }}  # homelab: {{ item.name }}"
        state: present
      loop: "{{ dns_records | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    # --- SSH hardening ---
    - name: Disable SSH password auth & root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
        - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
      notify: Restart SSH

    # --- Firewall ---
    - name: UFW — reset to clean state
      community.general.ufw:
        state: reset

    - name: UFW — set default policies
      community.general.ufw:
        direction: "{{ item.direction }}"
        default: "{{ item.default }}"
      loop:
        - { direction: incoming, default: deny }
        - { direction: outgoing, default: allow }

    - name: UFW — allow base ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: "22", proto: tcp }
        - { port: "41641", proto: udp }

    - name: UFW — allow host-specific ports
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
        src: "{{ item.src | default(omit) }}"
      loop: "{{ ufw_extra_rules | default([]) }}"
      loop_control:
        label: "{{ item.port }}"

    - name: UFW — enable
      community.general.ufw:
        state: enabled

    # --- Fail2ban ---
    - name: Configure fail2ban for SSH
      ansible.builtin.copy:
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          maxretry = {{ fail2ban_maxretry }}
          bantime = {{ fail2ban_bantime }}
          findtime = {{ fail2ban_findtime }}
        dest: /etc/fail2ban/jail.d/sshd.conf
        mode: "0644"
      notify: Restart fail2ban

    - name: Enable fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: true

    # --- Auto-updates ---
    - name: Enable unattended security upgrades
      ansible.builtin.copy:
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: "0644"

    # --- External storage ---
    - name: Mount external data drive
      ansible.posix.mount:
        src: "{{ data_mount.src }}"
        path: "{{ data_mount.path }}"
        fstype: "{{ data_mount.fstype }}"
        opts: "{{ data_mount.opts }}"
        state: mounted
      when: data_mount is defined

    - name: Create data directory tree
      ansible.builtin.file:
        path: "{{ data_mount.path }}/{{ item }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"
      loop: "{{ data_dirs | default([]) }}"
      when: data_mount is defined

    - name: Deploy YouTube API credentials
      ansible.builtin.copy:
        content: "{{ item.content }}"
        dest: "{{ data_mount.path }}/youtube/{{ item.name }}"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0600"
      loop:
        - { name: client_secret.json, content: "{{ vault_youtube_client_secret }}" }
        - { name: token.json, content: "{{ vault_youtube_token }}" }
      loop_control:
        label: "{{ item.name }}"
      no_log: true
      when:
        - data_mount is defined
        - vault_youtube_client_secret is defined

    # --- Docker ---
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repo
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_facts['distribution_release'] }} stable
        filename: docker

    - name: Install Docker
      ansible.builtin.apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: true

    - name: Enable Docker & add user to docker group
      block:
        - ansible.builtin.systemd:
            name: docker
            state: started
            enabled: true
        - ansible.builtin.user:
            name: "{{ admin_user }}"
            groups: docker
            append: true

    # --- Tailscale ---
    - name: Add Tailscale GPG key
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"
      when: tailscale_enabled | default(true)

    - name: Add Tailscale repo
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
          https://pkgs.tailscale.com/stable/ubuntu
          {{ ansible_facts['distribution_release'] }} main
        filename: tailscale
      when: tailscale_enabled | default(true)

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true
      when: tailscale_enabled | default(true)

    - name: Enable tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
      when: tailscale_enabled | default(true)

    - name: Check Tailscale status
      ansible.builtin.command: tailscale status --json
      register: ts_status
      changed_when: false
      failed_when: false
      when: tailscale_enabled | default(true)

    - name: Connect Tailscale
      ansible.builtin.command: >-
        nice -n 19 tailscale up --authkey={{ vault_tailscale_authkey }} --accept-dns=false
        {% if tailscale_advertise_routes is defined %}
        --advertise-routes={{ tailscale_advertise_routes | join(',') }}
        {% endif %}
      when:
        - tailscale_enabled | default(true)
        - vault_tailscale_authkey is defined
        - (ts_status.stdout | from_json).BackendState | default('') != 'Running'
      no_log: true
      tags: [tailscale-connect]

    - name: Update Tailscale advertised routes
      ansible.builtin.command: >-
        tailscale set
        --advertise-routes={{ tailscale_advertise_routes | join(',') }}
      when:
        - tailscale_enabled | default(true)
        - tailscale_advertise_routes is defined
        - (ts_status.stdout | from_json).BackendState | default('') == 'Running'
      tags: [tailscale-connect]

    - name: Check Tailscale serve status
      ansible.builtin.command: tailscale serve status
      register: ts_serve_status
      changed_when: false
      failed_when: false
      become: false
      when:
        - tailscale_enabled | default(true)
        - tailscale_serve_port is defined

    - name: Configure Tailscale serve (HTTPS proxy for gateway UI)
      ansible.builtin.command: tailscale serve --bg --yes localhost:{{ tailscale_serve_port }}
      when:
        - tailscale_enabled | default(true)
        - tailscale_serve_port is defined
        - (ts_status.stdout | from_json).BackendState | default('') == 'Running'
        - "'No serve config' in (ts_serve_status.stdout | default(''))"

    - name: Disconnect Tailscale (tailscale_enabled=false)
      ansible.builtin.command: tailscale logout
      when:
        - not (tailscale_enabled | default(true))
      failed_when: false
      changed_when: false

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: Restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted

    - name: Restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
