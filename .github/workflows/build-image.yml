name: Build & Push Image

# Triggers when any app's code changes
on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
  pull_request:
    paths:
      - 'apps/**'
  workflow_dispatch:
    inputs:
      app:
        description: "App directory under apps/ (e.g. georgios-website). Leave empty to auto-detect changed apps."
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # --- Detect which apps changed ---
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changed.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed apps
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.app }}" ]]; then
            CHANGED=$(printf '%s\n' "${{ github.event.inputs.app }}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- apps/ | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- apps/ | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi
          if [[ -z "$CHANGED" || "$CHANGED" == "null" ]]; then
            CHANGED="[]"
          fi
          echo "apps=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Changed apps: ${CHANGED}"

  # --- Run tests for changed apps (if they have tests/) ---
  # test:
  #   needs: detect
  #   if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
  #   runs-on: ubuntu-latest
  #   strategy:
  #     matrix:
  #       app: ${{ fromJson(needs.detect.outputs.apps) }}
  #
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Check for tests
  #       id: has_tests
  #       run: |
  #         if [[ -d "apps/${{ matrix.app }}/tests" ]]; then
  #           echo "run=true" >> "$GITHUB_OUTPUT"
  #         else
  #           echo "run=false" >> "$GITHUB_OUTPUT"
  #           echo "No tests/ directory in apps/${{ matrix.app }}/, skipping."
  #         fi
  #
  #     - name: Set up Python
  #       if: steps.has_tests.outputs.run == 'true'
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.12"
  #
  #     - name: Install dependencies
  #       if: steps.has_tests.outputs.run == 'true'
  #       run: pip install -r apps/${{ matrix.app }}/requirements.txt pytest
  #
  #     - name: Run tests
  #       if: steps.has_tests.outputs.run == 'true'
  #       working-directory: apps/${{ matrix.app }}
  #       run: python -m pytest tests/ -v --tb=short

  # --- Build & push each changed app ---
  build:
    needs: [detect]
    if: needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps || '[]') }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        run: |
          if [[ ! -f "apps/${{ matrix.app }}/Dockerfile" ]]; then
            echo "No Dockerfile in apps/${{ matrix.app }}/, skipping."
            exit 0
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Scan images for vulnerabilities ---
  scan:
    needs: [detect, build]
    if: github.event_name == 'push' && needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps || '[]') }}
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.app }}:latest
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
